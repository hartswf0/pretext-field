name: Publish Demo Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build static site
        run: |
          bun run site:build
          echo "--- Built site contents ---"
          find site -type f | head -80
          echo "--- Checking for stale .ts script refs ---"
          if grep -rn '\.ts"' site/ --include='*.html' | grep -v 'modulepreload'; then
            echo "⚠️  WARNING: found .ts references in built HTML (may be harmless modulepreload hints)"
          else
            echo "✅ No stale .ts script references in built HTML"
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
