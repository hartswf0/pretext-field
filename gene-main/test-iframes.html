<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe Test — All Pages</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2a2d3a;
            --text: #c8cad0;
            --text-dim: #6b6f7b;
            --accent: #5ec8b8;
            --accent-dim: rgba(94,200,184,0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Header ────────────────────────────────── */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15,17,23,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .top-bar h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
            white-space: nowrap;
        }

        .top-bar h1 span {
            color: var(--text-dim);
            font-weight: 400;
        }

        .controls {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .controls button {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            padding: 0.4rem 0.9rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
        }

        .controls button:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }

        .controls button.active {
            border-color: var(--accent);
            background: var(--accent);
            color: var(--bg);
        }

        .count-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-dim);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.3rem 0.7rem;
            border-radius: 20px;
        }

        /* ── Filter bar ────────────────────────────── */
        .filter-bar {
            display: flex;
            gap: 0.4rem;
            padding: 0.75rem 2rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-bar .label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-right: 0.5rem;
        }

        .filter-btn {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            padding: 0.25rem 0.6rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            color: var(--text);
            border-color: var(--text-dim);
        }

        .filter-btn.active {
            color: #fff;
            border-color: currentColor;
        }

        /* ── Grid ──────────────────────────────────── */
        .grid {
            display: grid;
            gap: 1.25rem;
            padding: 1.5rem 2rem 4rem;
            /* default: 2 columns */
            grid-template-columns: repeat(2, 1fr);
        }

        .grid.size-sm { grid-template-columns: repeat(3, 1fr); }
        .grid.size-md { grid-template-columns: repeat(2, 1fr); }
        .grid.size-lg { grid-template-columns: 1fr; }

        /* ── Card ──────────────────────────────────── */
        .frame-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .frame-card:hover {
            border-color: var(--card-accent, var(--accent));
            box-shadow: 0 0 20px rgba(94,200,184,0.08);
        }

        .frame-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 1rem;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.2);
        }

        .frame-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            overflow: hidden;
        }

        .frame-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .frame-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .frame-family {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            flex-shrink: 0;
        }

        .frame-actions {
            display: flex;
            gap: 0.3rem;
        }

        .frame-actions button {
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
        }

        .frame-actions button:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        .frame-card iframe {
            width: 100%;
            border: none;
            background: #fff;
            display: block;
            transition: height 0.3s ease;
        }

        .grid.size-sm .frame-card iframe { height: 280px; }
        .grid.size-md .frame-card iframe { height: 420px; }
        .grid.size-lg .frame-card iframe { height: 650px; }

        /* ── Path label ────────────────────────────── */
        .frame-path {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: var(--text-dim);
            padding: 0.35rem 1rem;
            border-top: 1px solid var(--border);
            background: rgba(0,0,0,0.15);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── Responsive ────────────────────────────── */
        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr !important; }
            .top-bar { padding: 0.75rem 1rem; }
            .grid { padding: 1rem; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <h1>IFRAME TEST <span>// all pages</span></h1>
    <div class="controls">
        <span class="count-badge" id="count"></span>
        <button data-size="sm">SM</button>
        <button data-size="md" class="active">MD</button>
        <button data-size="lg">LG</button>
        <button id="reload-all">↻ Reload All</button>
    </div>
</div>

<div class="filter-bar" id="filter-bar">
    <span class="label">FAMILY:</span>
    <button class="filter-btn active" data-family="all">ALL</button>
</div>

<div class="grid size-md" id="grid"></div>

<script>
(() => {
    // ── All HTML pages, grouped by family ───────
    // Paths are absolute from repo root — works with Bun clean URLs
    const pages = [
        // GENOMA
        { name: 'GENOMA Index',     path: '../gene-main.html',               family: 'GENOMA',      color: '#f43f5e' },
        { name: 'GENOMA Editor',    path: 'editor.html',        family: 'GENOMA',      color: '#f43f5e' },
        { name: 'GENOMA Scope',     path: 'scope.html',         family: 'GENOMA',      color: '#f43f5e' },
        { name: 'GENOMA Docs',      path: 'docs.html',          family: 'GENOMA',      color: '#f43f5e' },
        { name: 'GENOMA Registry',  path: 'registry.html',      family: 'GENOMA',      color: '#f43f5e' },

        // ORCA
        { name: 'BAT-MIND Claudar',       path: '../claudar.html',                    family: 'ORCA',        color: '#ff8c00' },
        { name: 'ORCA Aidar',             path: '../aidar.html',                      family: 'ORCA',        color: '#ff8c00' },
        { name: 'ENGRAM Jumpar',           path: '../jumpar.html',                     family: 'ORCA',        color: '#ff8c00' },
        { name: 'ORCA Shield 18',          path: '../ORCA/orca-shield-18.html',       family: 'ORCA',        color: '#ff8c00' },
        { name: 'WORD Orcadar',            path: '../WORD-ENGINE/orcadar.html',       family: 'ORCA',        color: '#ff8c00' },
        { name: 'WORD Walldar',            path: '../WORD-ENGINE/walldar.html',       family: 'ORCA',        color: '#ff8c00' },

        // CAVE
        { name: 'Cave: Bat',              path: '../pages/demos/bat.html',              family: 'CAVE', color: '#e024c3' },
        { name: 'Cave: Bat Echo',          path: '../pages/demos/bat-echo.html',         family: 'CAVE', color: '#e024c3' },
        { name: 'Cave: Spotlight',         path: '../pages/demos/spotlight.html',         family: 'CAVE', color: '#e024c3' },
        { name: 'Cave: Lantern',           path: '../pages/demos/lantern.html',           family: 'CAVE', color: '#e024c3' },
        { name: 'Cave: Moon',              path: '../pages/demos/power-of-a-moon.html',   family: 'CAVE', color: '#e024c3' },
        { name: 'Cave: Cartesian v1',      path: '../pages/demos/cartesian-breach.html',  family: 'CAVE', color: '#e024c3' },
        { name: 'Cave: Cartesian v2',      path: '../pages/demos/cartesian-breach-v2.html', family: 'CAVE', color: '#e024c3' },
        { name: 'Cave: ORCA LiDAR',        path: '../pages/demos/orca-lidar.html',        family: 'CAVE', color: '#e024c3' },
        { name: 'Cave: Cultural Brain',    path: '../pages/demos/cultural-brain.html',    family: 'CAVE', color: '#e024c3' },
        { name: 'Cave: Wordar',            path: '../pages/demos/wordar.html',            family: 'CAVE', color: '#e024c3' },
        { name: 'Cave: Voabar',            path: '../pages/demos/voabar.html',            family: 'CAVE', color: '#e024c3' },

        // LAYOUT
        { name: 'Dynamic Layout',         path: '../pages/demos/dynamic-layout.html',     family: 'LAYOUT',  color: '#5ec8b8' },
        { name: 'Bubbles',                path: '../pages/demos/bubbles.html',             family: 'LAYOUT',  color: '#5ec8b8' },
        { name: 'Accordion',              path: '../pages/demos/accordion.html',           family: 'LAYOUT',  color: '#5ec8b8' },
        { name: 'Rich Note',              path: '../pages/demos/rich-note.html',           family: 'LAYOUT',  color: '#5ec8b8' },
        { name: 'Masonry',                path: '../pages/demos/masonry.html',             family: 'LAYOUT',  color: '#5ec8b8' },

        // TYPOGRAPHIC
        { name: 'Editorial Engine',       path: '../pages/demos/editorial-engine.html',           family: 'TYPOGRAPHIC', color: '#c89b5e' },
        { name: 'Justification',          path: '../pages/demos/justification-comparison.html',   family: 'TYPOGRAPHIC', color: '#c89b5e' },
        { name: 'ASCII Typographic',      path: '../pages/demos/variable-typographic-ascii.html', family: 'TYPOGRAPHIC', color: '#c89b5e' },

        // INSTRUMENT
        { name: 'Cognitive Lanes',        path: '../cognitive-lanes.html',   family: 'INSTRUMENT', color: '#fbbf24' },

        // OTHER
        { name: 'Demos Index',            path: '../pages/demos.html',              family: 'OTHER', color: '#6b6f7b' },
        { name: 'Cave Index',             path: '../pages/demos/index-cave.html',   family: 'OTHER', color: '#6b6f7b' },
        { name: 'Onyx Abs 26',            path: '../MAP-BUCKET/onyx-abs-26.html',   family: 'OTHER', color: '#6b6f7b' },
    ];

    const grid = document.getElementById('grid');
    const countBadge = document.getElementById('count');
    const filterBar = document.getElementById('filter-bar');

    // ── Build family filter buttons ─────────
    const families = [...new Set(pages.map(p => p.family))];
    families.forEach(fam => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.family = fam;
        btn.textContent = fam;
        const c = pages.find(p => p.family === fam)?.color || '#888';
        btn.style.setProperty('--fc', c);
        btn.addEventListener('click', () => setFilter(fam));
        filterBar.appendChild(btn);
    });

    // ── Filter logic ────────────────────────
    let activeFamily = 'all';

    function setFilter(fam) {
        activeFamily = fam;
        filterBar.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.family === fam);
            if (b.dataset.family === fam && fam !== 'all') {
                b.style.borderColor = b.style.getPropertyValue('--fc') || 'var(--accent)';
                b.style.color = b.style.getPropertyValue('--fc') || 'var(--accent)';
            } else if (b.dataset.family === fam && fam === 'all') {
                b.style.borderColor = 'var(--accent)';
                b.style.color = 'var(--accent)';
            } else {
                b.style.borderColor = '';
                b.style.color = '';
            }
        });
        renderCards();
    }

    // ── Render ───────────────────────────────
    function renderCards() {
        const filtered = activeFamily === 'all' ? pages : pages.filter(p => p.family === activeFamily);
        countBadge.textContent = `${filtered.length} / ${pages.length}`;

        grid.innerHTML = '';
        filtered.forEach((page, i) => {
            const card = document.createElement('div');
            card.className = 'frame-card';
            card.style.setProperty('--card-accent', page.color);
            card.style.animationDelay = `${i * 0.04}s`;

            card.innerHTML = `
                <div class="frame-header">
                    <div class="frame-title">
                        <div class="frame-dot" style="background:${page.color}"></div>
                        <span class="frame-name">${page.name}</span>
                        <span class="frame-family" style="color:${page.color}">${page.family}</span>
                    </div>
                    <div class="frame-actions">
                        <button onclick="this.closest('.frame-card').querySelector('iframe').src += ''" title="Reload">↻</button>
                        <button onclick="window.open('${page.path}','_blank')" title="Open in new tab">↗</button>
                    </div>
                </div>
                <iframe src="${page.path}" loading="lazy" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>
                <div class="frame-path">${page.path}</div>
            `;

            grid.appendChild(card);
        });
    }

    // ── Size buttons ────────────────────────
    document.querySelectorAll('[data-size]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('[data-size]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            grid.className = `grid size-${btn.dataset.size}`;
        });
    });

    // ── Reload all ──────────────────────────
    document.getElementById('reload-all').addEventListener('click', () => {
        grid.querySelectorAll('iframe').forEach(f => { f.src += ''; });
    });

    // ── Init ────────────────────────────────
    renderCards();
})();
</script>
</body>
</html>
