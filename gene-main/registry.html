<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GENOMA // ANCESTRY REGISTRY</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🧬%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@200;300;400;500;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --panel: #111113;
            --surface: #18181b;
            --border: #27272a;
            --border-hover: #3f3f46;
            --text: #e4e4e7;
            --text-muted: #71717a;
            --text-dim: #3f3f46;
            --func: #f43f5e;
            --cyan: #2dd4bf;
            --amber: #fbbf24;
            --violet: #8b5cf6;
            --blue: #3b82f6;
            --green: #10b981;
            --rose: #f43f5e;
            --pink: #e024c3;
            --mono: 'JetBrains Mono', 'Menlo', monospace;
            --serif: 'Crimson Pro', Georgia, serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        *::-webkit-scrollbar { width: 4px; }
        *::-webkit-scrollbar-track { background: transparent; }
        *::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        body {
            height: 100vh;
            height: 100dvh;
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ── */
        header {
            height: 52px;
            flex-shrink: 0;
            background: #000;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
        }

        .brand {
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .brand .icon { color: var(--func); font-size: 16px; }
        .brand em { font-style: normal; color: var(--func); }

        .header-stats {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .stat-label {
            font-size: 7px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-dim);
        }
        .stat-val {
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
        }

        .header-controls {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .header-search {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border: 1px solid var(--border);
            border-radius: 3px;
            background: var(--surface);
        }
        .header-search input {
            background: none;
            border: none;
            outline: none;
            color: var(--text);
            font-family: var(--mono);
            font-size: 9px;
            width: 140px;
        }
        .header-search input::placeholder { color: var(--text-dim); }
        .header-search .search-icon { font-size: 10px; color: var(--text-dim); }

        /* ── Family Strip ── */
        .family-strip {
            height: 44px;
            flex-shrink: 0;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 6px;
            overflow-x: auto;
        }

        .family-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            font-family: var(--mono);
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.04em;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
        }
        .family-chip:hover {
            border-color: var(--border-hover);
            color: var(--text);
            background: var(--surface);
        }
        .family-chip.active {
            color: #000;
            font-weight: 700;
        }
        .family-chip .chip-icon { font-size: 12px; }
        .family-chip .chip-count {
            font-size: 8px;
            opacity: 0.6;
            margin-left: 2px;
        }

        .chip-all {
            border-color: var(--text-dim);
            color: var(--text);
        }
        .chip-all.active {
            background: var(--text);
            color: #000;
            border-color: var(--text);
        }

        /* ── Main Layout ── */
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ── Ancestry Graph ── */
        .graph-panel {
            flex: 0 0 45%;
            position: relative;
            overflow: hidden;
            border-right: 1px solid var(--border);
            background: var(--panel);
        }

        .graph-canvas {
            width: 100%;
            height: 100%;
            display: block;
            cursor: grab;
        }
        .graph-canvas:active { cursor: grabbing; }

        .graph-legend {
            position: absolute;
            bottom: 12px;
            left: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 8px;
            color: var(--text-muted);
            pointer-events: none;
        }
        .legend-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .legend-swatch {
            width: 8px;
            height: 8px;
            border-radius: 2px;
        }

        /* Graph controls */
        .graph-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .graph-btn {
            width: 26px;
            height: 26px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 3px;
            color: var(--text-muted);
            font-family: var(--mono);
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.12s;
        }
        .graph-btn:hover { border-color: var(--border-hover); color: var(--text); }

        /* ── Detail Panel ── */
        .detail-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Genome Header ── */
        .genome-header {
            flex-shrink: 0;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }
        .genome-header-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 6px;
        }
        .genome-family-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 8px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .genome-name {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.01em;
            margin-bottom: 4px;
        }
        .genome-path {
            font-size: 10px;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }
        .path-link {
            color: var(--blue);
            text-decoration: none;
            font-size: 10px;
            padding: 1px 4px;
            border-radius: 2px;
            border: 1px solid rgba(59,130,246,0.2);
            transition: all 0.1s;
        }
        .path-link:hover {
            background: rgba(59,130,246,0.1);
            border-color: rgba(59,130,246,0.5);
        }
        .genome-status {
            font-size: 7px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 2px 6px;
            border-radius: 2px;
        }
        .status-active { color: var(--green); background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); }
        .status-dormant { color: var(--amber); background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.2); }
        .genome-desc {
            font-family: var(--serif);
            font-size: 13.5px;
            font-weight: 300;
            line-height: 1.65;
            color: var(--text-muted);
        }

        /* open-file button */
        .open-btn {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 3px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            font-family: var(--mono);
            font-size: 8px;
            font-weight: 500;
            letter-spacing: 0.04em;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.12s;
            white-space: nowrap;
        }
        .open-btn:hover {
            border-color: var(--cyan);
            color: var(--cyan);
            background: rgba(45,212,191,0.06);
        }

        /* ── Codon Sequence ── */
        .codon-section {
            flex: 1;
            overflow-y: auto;
            padding: 14px 20px 40px;
        }

        .section-label {
            font-size: 8px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }

        .codon-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 7px 0;
            border-bottom: 1px solid rgba(39,39,42,0.5);
            transition: background 0.1s;
        }
        .codon-row:hover {
            background: rgba(255,255,255,0.02);
            margin: 0 -8px;
            padding: 7px 8px;
        }

        .codon-badge {
            flex-shrink: 0;
            width: 38px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 0.05em;
        }
        .codon-FN { background: rgba(244,63,94,0.15); color: var(--func); }
        .codon-VAR { background: rgba(45,212,191,0.12); color: var(--cyan); }
        .codon-LNK { background: rgba(59,130,246,0.12); color: var(--blue); }
        .codon-GFX { background: rgba(224,36,195,0.12); color: var(--pink); }
        .codon-SND { background: rgba(251,191,36,0.12); color: var(--amber); }
        .codon-EVT { background: rgba(16,185,129,0.12); color: var(--green); }
        .codon-TXT { background: rgba(139,92,246,0.12); color: var(--violet); }
        .codon-HDR { background: rgba(228,228,231,0.08); color: var(--text); }
        .codon-CSS { background: rgba(244,63,94,0.08); color: #fb7185; }
        .codon-DAT { background: rgba(45,212,191,0.08); color: #5eead4; }
        .codon-DOM { background: rgba(251,191,36,0.08); color: #fde68a; }
        .codon-DOC { background: rgba(139,92,246,0.08); color: #a78bfa; }
        .codon-CTRL { background: rgba(251,191,36,0.1); color: var(--amber); }
        .codon-NET { background: rgba(59,130,246,0.08); color: #93c5fd; }
        .codon-TST { background: rgba(16,185,129,0.08); color: #6ee7b7; }
        .codon-BLD { background: rgba(113,113,122,0.12); color: var(--text-muted); }

        .codon-payload {
            font-size: 11px;
            line-height: 1.5;
            color: var(--text-muted);
            flex: 1;
            word-break: break-word;
        }
        .codon-payload a {
            color: var(--blue);
            text-decoration: none;
        }
        .codon-payload a:hover { text-decoration: underline; }

        .codon-state {
            flex-shrink: 0;
            font-size: 7px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 2px 5px;
            border-radius: 2px;
        }
        .state-active { color: var(--green); background: rgba(16,185,129,0.1); }
        .state-dormant { color: var(--amber); background: rgba(251,191,36,0.1); }

        /* ── Connections ── */
        .connections-section {
            padding: 12px 20px 16px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .conn-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .conn-chip {
            padding: 4px 10px;
            border-radius: 3px;
            border: 1px solid var(--border);
            font-size: 9px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.12s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .conn-chip:hover {
            border-color: var(--text);
            color: var(--text);
            transform: translateY(-1px);
        }
        .conn-chip.type-imports { border-left: 2px solid var(--blue); }
        .conn-chip.type-sibling { border-left: 2px solid var(--green); }
        .conn-chip.type-ancestor { border-left: 2px solid var(--amber); }
        .conn-chip.type-research { border-left: 2px solid var(--violet); }
        .conn-type-label { font-size: 7px; opacity: 0.5; }

        /* ── Empty State ── */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-size: 11px;
            letter-spacing: 0.05em;
            gap: 12px;
        }
        .empty-icon { font-size: 40px; opacity: 0.3; }

        /* ── Search Results overlay ── */
        .search-results {
            position: absolute;
            top: 52px;
            left: 0;
            right: 0;
            background: #000;
            border-bottom: 1px solid var(--border);
            z-index: 200;
            max-height: 280px;
            overflow-y: auto;
            display: none;
        }
        .search-results.visible { display: block; }
        .search-result-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            border-bottom: 1px solid rgba(39,39,42,0.5);
            cursor: pointer;
            transition: background 0.1s;
        }
        .search-result-item:hover { background: var(--surface); }
        .search-result-name { font-size: 11px; color: var(--text); }
        .search-result-family { font-size: 8px; color: var(--text-muted); }
        .search-result-path { font-size: 8px; color: var(--text-dim); margin-left: auto; }
        .search-no-results { padding: 16px; font-size: 10px; color: var(--text-dim); text-align: center; }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .main { flex-direction: column; position: relative; }
            .graph-panel {
                flex: 0 0 100%;
                height: 100%;
                border-right: none;
                border-bottom: none;
                display: none;
            }
            .graph-panel.mobile-active { display: block; }
            .detail-panel {
                flex: 1;
                height: 100%;
                display: none;
            }
            .detail-panel.mobile-active { display: flex; }

            /* Show search on mobile — adapt to full width */
            .header-search {
                display: flex !important;
                flex: 1;
                max-width: 180px;
            }
            .header-search input {
                width: 100%;
                font-size: 11px;
            }

            /* Bigger touch targets */
            .family-chip {
                padding: 8px 14px;
                font-size: 10px;
            }
            .family-strip {
                height: 48px;
                padding: 0 12px;
                gap: 8px;
            }

            /* Header stats: hide less important ones on small screens */
            .header-stats {
                gap: 10px;
            }

            /* Codon rows need bigger touch targets */
            .codon-row {
                padding: 10px 0;
            }
            .codon-badge {
                width: 42px;
                height: 24px;
                font-size: 9px;
            }
            .codon-payload {
                font-size: 12px;
            }

            /* Connection chips bigger */
            .conn-chip {
                padding: 8px 12px;
                font-size: 10px;
            }

            /* Genome header spacing */
            .genome-header {
                padding: 14px 16px;
            }
            .genome-name {
                font-size: 16px;
            }
            .genome-desc {
                font-size: 13px;
            }

            /* Open button bigger */
            .open-btn {
                padding: 8px 12px;
                font-size: 9px;
            }
        }

        @media (max-width: 480px) {
            header {
                padding: 0 10px;
                height: 48px;
            }
            .brand {
                font-size: 10px;
                gap: 6px;
            }
            .header-stats {
                display: none;
            }
            .header-search {
                max-width: 120px;
            }
            .genome-header-top {
                flex-direction: column;
                gap: 8px;
            }
        }

        /* ── Mobile View Toggle Bar ── */
        .mobile-view-bar {
            display: none;
            height: 44px;
            background: #000;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        @media (max-width: 900px) {
            .mobile-view-bar {
                display: flex;
                align-items: stretch;
            }
        }
        .mobile-view-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: all 0.15s;
            border-top: 2px solid transparent;
        }
        .mobile-view-btn:first-child {
            border-right: 1px solid var(--border);
        }
        .mobile-view-btn.active {
            color: var(--cyan);
            border-top-color: var(--cyan);
            background: rgba(45,212,191,0.04);
        }
        .mobile-view-btn .mv-icon {
            font-size: 14px;
        }

        /* ── External link indicator ── */
        .sitemap-link.is-external {
            opacity: 0.45;
        }
        .sitemap-link.is-external:hover {
            opacity: 0.7;
        }

        /* ── Mobile Genome Quick-Pick List ── */
        .mobile-genome-list {
            display: none;
            width: 100%;
            max-width: 400px;
            max-height: 50vh;
            overflow-y: auto;
            margin-top: 12px;
        }
        @media (max-width: 900px) {
            .mobile-genome-list { display: flex; flex-direction: column; gap: 2px; }
        }
        .mgl-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 5px;
            border: 1px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            transition: all 0.12s;
            text-align: left;
        }
        .mgl-item:hover, .mgl-item:active {
            border-color: var(--border-hover);
            background: var(--panel);
            transform: translateY(-1px);
        }
        .mgl-icon { font-size: 16px; flex-shrink: 0; }
        .mgl-info { flex: 1; min-width: 0; }
        .mgl-name {
            font-size: 11px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .mgl-family {
            font-size: 8px;
            color: var(--text-muted);
            letter-spacing: 0.04em;
        }

        /* ── Site Map Drawer ── */
        .sitemap-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(3px);
            z-index: 900;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s, visibility 0.25s;
        }
        .sitemap-backdrop.open { opacity: 1; visibility: visible; }

        .sitemap-drawer {
            position: fixed;
            top: 0; left: 0;
            width: 360px;
            max-width: 92vw;
            height: 100vh;
            height: 100dvh;
            background: #0c0c0e;
            border-right: 1px solid var(--border);
            z-index: 950;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .sitemap-drawer.open { transform: translateX(0); }

        .sitemap-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .sitemap-title {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: var(--text-muted);
        }
        .sitemap-title em { font-style: normal; color: var(--cyan); }
        .sitemap-close {
            background: none; border: none;
            color: var(--text-muted);
            font-size: 16px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 3px;
            transition: all 0.12s;
        }
        .sitemap-close:hover { color: var(--text); background: var(--surface); }

        .sitemap-body {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0 40px;
        }

        .sitemap-group {
            margin-bottom: 4px;
        }
        .sitemap-group-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-dim);
            cursor: pointer;
            transition: color 0.12s;
            user-select: none;
        }
        .sitemap-group-header:hover { color: var(--text-muted); }
        .sitemap-group-icon { font-size: 13px; }
        .sitemap-group-count {
            margin-left: auto;
            font-size: 8px;
            opacity: 0.5;
        }
        .sitemap-group-chevron {
            font-size: 8px;
            transition: transform 0.2s;
            margin-left: 4px;
        }
        .sitemap-group.collapsed .sitemap-group-chevron { transform: rotate(-90deg); }

<script>
'use strict';

// ────────────────────────────────────────────
// STATE
// ────────────────────────────────────────────
let registry = null;
let activeFamily = null;
let activeGenome = null;
let nodes = [];
let graphEdges = [];

// Graph transform
let panX = 0, panY = 0, zoom = 1;
let isDragging = false, dragStartX = 0, dragStartY = 0;
let startPanX = 0, startPanY = 0;
let hoveredNode = null;

const canvas = document.getElementById('graph-canvas');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;

// ────────────────────────────────────────────
// PATH → HYPERLINK helpers
// ────────────────────────────────────────────
// Heuristic base path: files relative to gene-main/, or absolute from repo root
const REPO_ROOT = '../';

function pathToUrl(p) {
    // If already a URL, return as-is
    if (/^https?:\/\//.test(p)) return p;
    // Paths that look like gene-main/ siblings (files that live IN gene-main/)
    if (/^(editor|scope|docs|registry|index)\.html$/.test(p)) return p;
    // src/ pages/ scripts/ and other repo-root subdirectory paths
    if (p.startsWith('src/') || p.startsWith('pages/') || p.startsWith('scripts/') || p.startsWith('corpora/') || p.startsWith('accuracy/') || p.startsWith('benchmarks/') || p.startsWith('status/') || p.startsWith('gene-main/')) {
        return REPO_ROOT + p;
    }
    // WORD-ENGINE/ ORCA/ CULTURE-MIND-BRAIN/ subdirectory paths
    if (p.startsWith('WORD-ENGINE/') || p.startsWith('ORCA/') || p.startsWith('CULTURE-MIND-BRAIN/') || p.startsWith('MAP-BUCKET/') || p.startsWith('cave-demos/')) {
        return REPO_ROOT + p;
    }
    // Bare .html/.ts/.js/.json/.md files without a directory prefix → these live at repo root, not in gene-main/
    if (/\.(html|ts|js|json|md)$/.test(p) && !p.includes('/')) {
        return REPO_ROOT + p;
    }
    // Fallback
    return p;
}

function renderPaths(pathVal, baseDir) {
    const paths = Array.isArray(pathVal) ? pathVal : [pathVal];
    return paths.map(p => {
        // Resolve relative to baseDir hint if provided
        const url = baseDir ? (REPO_ROOT + baseDir + '/' + p.split('/').pop()) : pathToUrl(p);
        const label = p.split('/').pop();
        return `<a class="path-link" href="${url}" target="_blank" rel="noopener">${label}</a>`;
    }).join(' ');
}

// Detect if a codon payload contains a URL or file path and make it linkable
function enrichPayload(codon, payload) {
    // URL pattern
    const urlMatch = payload.match(/https?:\/\/\S+/);
    if (urlMatch) {
        return payload.replace(/(https?:\/\/\S+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
    }
    // import / from 'path' patterns
    const importMatch = payload.match(/from ['"]([^'"]+)['"]/);
    if (importMatch) {
        const importPath = importMatch[1];
        const url = importPath.startsWith('.') ? '#' : pathToUrl(importPath.replace(/^\.\//, 'src/'));
        return payload.replace(importMatch[0], `from '<a href="${url}" target="_blank" rel="noopener">${importPath}</a>'`);
    }
    // LNK codon: check for file path patterns
    if (codon === 'LNK') {
        // Check for .html / .ts / .js extension
        const fileMatch = payload.match(/([^\s]+\.(html|ts|js|json|md))/);
        if (fileMatch) {
            const fp = fileMatch[1];
            const url = pathToUrl(fp);
            return payload.replace(fp, `<a href="${url}" target="_blank" rel="noopener">${fp}</a>`);
        }
    }
    return payload;
}

// ────────────────────────────────────────────
// LOAD REGISTRY
// ────────────────────────────────────────────
async function loadRegistry() {
    try {
        const res = await fetch('registry.json');
        registry = await res.json();
    } catch (e) {
        console.error('Failed to load registry.json:', e);
        return;
    }

    // Stats
    const totalCodons = registry.genomes.reduce((sum, g) => sum + (g.sequence ? g.sequence.length : 0), 0);
    document.getElementById('stat-genomes').textContent = registry.genomes.length;
    document.getElementById('stat-families').textContent = Object.keys(registry.families).length;
    document.getElementById('stat-edges').textContent = registry.edges.length;
    document.getElementById('stat-codons').textContent = totalCodons;

    buildFamilyStrip();
    buildGraphNodes();
    renderGraph();
    setupSearch();
    setupZoomControls();
    buildMobileGenomeList();
}

function buildMobileGenomeList() {
    const list = document.getElementById('mobile-genome-list');
    if (!list || !registry) return;
    list.innerHTML = '';

    // Group by family
    const familyKeys = Object.keys(registry.families);
    familyKeys.forEach(famKey => {
        const fam = registry.families[famKey];
        const members = registry.genomes.filter(g => g.family === famKey);
        if (!members.length) return;

        members.forEach(g => {
            const item = document.createElement('div');
            item.className = 'mgl-item';
            item.dataset.id = g.id;
            item.innerHTML = `
                <span class="mgl-icon">${fam.icon}</span>
                <div class="mgl-info">
                    <div class="mgl-name">${g.name}</div>
                    <div class="mgl-family" style="color:${fam.color}">${fam.name.split('—')[0].trim()}</div>
                </div>
            `;
            item.onclick = () => selectGenome(g.id);
            list.appendChild(item);
        });
    });
}

// ────────────────────────────────────────────
// SEARCH
// ────────────────────────────────────────────
function setupSearch() {
    const input = document.getElementById('search-input');
    const resultsEl = document.getElementById('search-results');

    input.addEventListener('input', () => {
        const q = input.value.trim().toLowerCase();
        if (!q) { resultsEl.innerHTML = ''; resultsEl.classList.remove('visible'); return; }

        const matches = registry.genomes.filter(g =>
            g.name.toLowerCase().includes(q) ||
            g.id.toLowerCase().includes(q) ||
            (g.description && g.description.toLowerCase().includes(q)) ||
            (g.family && g.family.toLowerCase().includes(q))
        );

        if (!matches.length) {
            resultsEl.innerHTML = '<div class="search-no-results">No genomes match</div>';
        } else {
            resultsEl.innerHTML = matches.slice(0, 12).map(g => {
                const fam = registry.families[g.family] || { icon: '?', color: '#555' };
                const pathStr = Array.isArray(g.path) ? g.path[0] : g.path;
                return `<div class="search-result-item" data-id="${g.id}">
                    <span style="font-size:14px">${fam.icon}</span>
                    <div>
                        <div class="search-result-name">${g.name}</div>
                        <div class="search-result-family" style="color:${fam.color}">${g.family}</div>
                    </div>
                    <span class="search-result-path">${pathStr || ''}</span>
                </div>`;
            }).join('');
        }
        resultsEl.classList.add('visible');
    });

    resultsEl.addEventListener('click', e => {
        const item = e.target.closest('.search-result-item');
        if (item) {
            input.value = '';
            resultsEl.innerHTML = '';
            resultsEl.classList.remove('visible');
            selectGenome(item.dataset.id);
            // Also center graph on that node
            const node = nodes.find(n => n.id === item.dataset.id);
            if (node) centerOnNode(node);
        }
    });

    document.addEventListener('click', e => {
        if (!e.target.closest('.header-search') && !e.target.closest('#search-results')) {
            resultsEl.classList.remove('visible');
        }
    });

    input.addEventListener('keydown', e => {
        if (e.key === 'Escape') { input.value = ''; resultsEl.innerHTML = ''; resultsEl.classList.remove('visible'); }
    });
}

function centerOnNode(node) {
    const W = canvas.clientWidth;
    const H = canvas.clientHeight;
    panX = W / 2 - node.x * zoom;
    panY = H / 2 - node.y * zoom;
    renderGraph();
}

// ────────────────────────────────────────────
// ZOOM CONTROLS
// ────────────────────────────────────────────
function setupZoomControls() {
    document.getElementById('zoom-in').onclick = () => {
        const W = canvas.clientWidth, H = canvas.clientHeight;
        const factor = 1.25;
        panX = W/2 - (W/2 - panX) * factor;
        panY = H/2 - (H/2 - panY) * factor;
        zoom = Math.min(3, zoom * factor);
        renderGraph();
    };
    document.getElementById('zoom-out').onclick = () => {
        const W = canvas.clientWidth, H = canvas.clientHeight;
        const factor = 0.8;
        panX = W/2 - (W/2 - panX) * factor;
        panY = H/2 - (H/2 - panY) * factor;
        zoom = Math.max(0.3, zoom * factor);
        renderGraph();
    };
    document.getElementById('zoom-reset').onclick = () => {
        panX = 0; panY = 0; zoom = 1;
        renderGraph();
    };
}

// ────────────────────────────────────────────
// FAMILY STRIP
// ────────────────────────────────────────────
function buildFamilyStrip() {
    const strip = document.getElementById('family-strip');
    strip.innerHTML = '';

    // All chip
    const allChip = document.createElement('button');
    allChip.className = 'family-chip chip-all active';
    allChip.innerHTML = `<span class="chip-icon">◉</span> ALL <span class="chip-count">${registry.genomes.length}</span>`;
    allChip.onclick = () => setFamilyFilter(null);
    strip.appendChild(allChip);

    // Family chips
    Object.entries(registry.families).forEach(([key, fam]) => {
        const chip = document.createElement('button');
        chip.className = 'family-chip';
        chip.dataset.family = key;
        chip.innerHTML = `<span class="chip-icon">${fam.icon}</span> ${fam.name.split('—')[0].trim()} <span class="chip-count">${fam.members.length}</span>`;
        chip.onclick = () => setFamilyFilter(key);
        strip.appendChild(chip);
    });

    // Legend
    const legend = document.getElementById('graph-legend');
    legend.innerHTML = '';
    Object.entries(registry.families).forEach(([key, fam]) => {
        const row = document.createElement('div');
        row.className = 'legend-row';
        row.innerHTML = `<div class="legend-swatch" style="background:${fam.color}"></div>${fam.icon} ${key}`;
        legend.appendChild(row);
    });
}

function setFamilyFilter(family) {
    activeFamily = family;

    // Update chip styling
    document.querySelectorAll('.family-chip').forEach(c => {
        c.classList.remove('active');
        c.style.background = '';
        c.style.borderColor = '';
        c.style.color = '';
    });

    if (!family) {
        document.querySelector('.chip-all').classList.add('active');
    } else {
        const fam = registry.families[family];
        const chip = document.querySelector(`[data-family="${family}"]`);
        if (chip && fam) {
            chip.classList.add('active');
            chip.style.background = fam.color;
            chip.style.borderColor = fam.color;
        }
    }

    buildGraphNodes();
    renderGraph();
}

// ────────────────────────────────────────────
// GRAPH NODES — Force-directed layout
// ────────────────────────────────────────────
function buildGraphNodes() {
    nodes = [];
    graphEdges = [];

    const genomes = activeFamily
        ? registry.genomes.filter(g => g.family === activeFamily)
        : registry.genomes;

    const genomeIds = new Set(genomes.map(g => g.id));
    const W = canvas.clientWidth;
    const H = canvas.clientHeight;
    const cx = W / 2;
    const cy = H / 2;

    // Layout genomes in family clusters using concentric rings
    const familyMap = {};
    genomes.forEach(g => {
        if (!familyMap[g.family]) familyMap[g.family] = [];
        familyMap[g.family].push(g);
    });

    const familyKeys = Object.keys(familyMap);
    const ringRadius = Math.min(W, H) * 0.32;

    familyKeys.forEach((famKey, fi) => {
        const members = familyMap[famKey];
        const famAngle = (fi / familyKeys.length) * Math.PI * 2 - Math.PI / 2;
        const famCx = cx + Math.cos(famAngle) * ringRadius * 0.6;
        const famCy = cy + Math.sin(famAngle) * ringRadius * 0.6;
        const memberRadius = Math.min(80, 30 + members.length * 8);

        members.forEach((g, mi) => {
            const angle = (mi / members.length) * Math.PI * 2 - Math.PI / 2;
            const x = famCx + Math.cos(angle) * memberRadius;
            const y = famCy + Math.sin(angle) * memberRadius;

            nodes.push({
                id: g.id,
                genome: g,
                x,
                y,
                vx: 0,
                vy: 0,
                radius: 6 + (g.sequence ? g.sequence.length * 0.4 : 0),
                color: registry.families[g.family]?.color || '#555',
                family: g.family
            });
        });
    });

    // Build edges
    registry.edges.forEach(e => {
        if (genomeIds.has(e.from) && genomeIds.has(e.to)) {
            graphEdges.push(e);
        }
    });

    // Run a few iterations of force simulation
    for (let iter = 0; iter < 120; iter++) {
        forceStep();
    }

    // Reset pan/zoom
    panX = 0;
    panY = 0;
    zoom = 1;
}

function forceStep() {
    const k = 0.008; // spring constant
    const repel = 800;
    const damp = 0.85;
    const cx = canvas.clientWidth / 2;
    const cy = canvas.clientHeight / 2;

    // Repulsion between all nodes
    for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
            const a = nodes[i], b = nodes[j];
            let dx = a.x - b.x, dy = a.y - b.y;
            let dist = Math.sqrt(dx * dx + dy * dy) || 1;
            let force = repel / (dist * dist);
            const fx = (dx / dist) * force;
            const fy = (dy / dist) * force;
            a.vx += fx; a.vy += fy;
            b.vx -= fx; b.vy -= fy;
        }
    }

    // Attraction along edges
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    graphEdges.forEach(e => {
        const a = nodeMap[e.from], b = nodeMap[e.to];
        if (!a || !b) return;
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const idealDist = 60;
        const force = k * (dist - idealDist);
        a.vx += (dx / dist) * force;
        a.vy += (dy / dist) * force;
        b.vx -= (dx / dist) * force;
        b.vy -= (dy / dist) * force;
    });

    // Center gravity
    nodes.forEach(n => {
        n.vx += (cx - n.x) * 0.001;
        n.vy += (cy - n.y) * 0.001;
    });

    // Same-family attraction
    nodes.forEach(a => {
        nodes.forEach(b => {
            if (a === b || a.family !== b.family) return;
            const dx = b.x - a.x, dy = b.y - a.y;
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
            a.vx += (dx / dist) * 0.15;
            a.vy += (dy / dist) * 0.15;
        });
    });

    // Integrate
    nodes.forEach(n => {
        n.vx *= damp;
        n.vy *= damp;
        n.x += n.vx;
        n.y += n.vy;
    });
}

// ────────────────────────────────────────────
// GRAPH RENDER
// ────────────────────────────────────────────
function renderGraph() {
    const W = canvas.clientWidth;
    const H = canvas.clientHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--panel').trim();
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    ctx.translate(panX, panY);
    ctx.scale(zoom, zoom);

    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    // Draw edges
    graphEdges.forEach(e => {
        const a = nodeMap[e.from], b = nodeMap[e.to];
        if (!a || !b) return;

        let color = '#333';
        let width = 0.5;
        let alpha = 0.25;

        if (activeGenome) {
            if (e.from === activeGenome || e.to === activeGenome) {
                if (e.type === 'imports') color = '#3b82f6';
                else if (e.type === 'sibling') color = '#10b981';
                else if (e.type === 'ancestor') color = '#fbbf24';
                else if (e.type === 'research') color = '#8b5cf6';
                alpha = 0.8;
                width = 1.5;
            } else {
                alpha = 0.05;
            }
        }

        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.globalAlpha = alpha;
        ctx.beginPath();

        // Curved edge
        const mx = (a.x + b.x) / 2;
        const my = (a.y + b.y) / 2;
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const cpx = mx - dy * 0.15;
        const cpy = my + dx * 0.15;

        ctx.moveTo(a.x, a.y);
        ctx.quadraticCurveTo(cpx, cpy, b.x, b.y);
        ctx.stroke();

        // Arrow tip
        if (activeGenome && (e.from === activeGenome || e.to === activeGenome)) {
            const t = 0.85;
            const tipX = (1-t)*(1-t)*a.x + 2*(1-t)*t*cpx + t*t*b.x;
            const tipY = (1-t)*(1-t)*a.y + 2*(1-t)*t*cpy + t*t*b.y;
            const tangX = 2*(1-t)*(cpx-a.x) + 2*t*(b.x-cpx);
            const tangY = 2*(1-t)*(cpy-a.y) + 2*t*(b.y-cpy);
            const angle = Math.atan2(tangY, tangX);
            const arrowLen = 5;
            ctx.beginPath();
            ctx.moveTo(tipX, tipY);
            ctx.lineTo(tipX - arrowLen*Math.cos(angle-0.4), tipY - arrowLen*Math.sin(angle-0.4));
            ctx.moveTo(tipX, tipY);
            ctx.lineTo(tipX - arrowLen*Math.cos(angle+0.4), tipY - arrowLen*Math.sin(angle+0.4));
            ctx.stroke();
        }

        ctx.globalAlpha = 1;
    });

    // Edge labels on hover
    if (activeGenome) {
        ctx.font = '500 7px JetBrains Mono, monospace';
        graphEdges.forEach(e => {
            if (!e.label) return;
            if (e.from !== activeGenome && e.to !== activeGenome) return;
            const a = nodeMap[e.from], b = nodeMap[e.to];
            if (!a || !b) return;
            const mx = (a.x + b.x) / 2 - (b.y - a.y) * 0.15;
            const my = (a.y + b.y) / 2 + (b.x - a.x) * 0.15;
            ctx.globalAlpha = 0.55;
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(e.label, mx, my);
            ctx.globalAlpha = 1;
        });
    }

    // Draw nodes
    nodes.forEach(n => {
        let r = n.radius;
        let alpha = 1;
        let strokeColor = n.color;
        let fillAlpha = 0.15;
        let textAlpha = 0.6;
        let textSize = 7;

        if (activeGenome) {
            if (n.id === activeGenome) {
                r *= 1.3;
                fillAlpha = 0.9;
                strokeColor = '#fff';
                textAlpha = 1;
                textSize = 9;
            } else {
                const connectedIds = new Set();
                graphEdges.forEach(e => {
                    if (e.from === activeGenome) connectedIds.add(e.to);
                    if (e.to === activeGenome) connectedIds.add(e.from);
                });
                if (connectedIds.has(n.id)) {
                    fillAlpha = 0.4;
                    textAlpha = 0.9;
                } else {
                    alpha = 0.12;
                    textAlpha = 0.1;
                }
            }
        }

        if (hoveredNode === n.id && n.id !== activeGenome) {
            r *= 1.15;
            fillAlpha = Math.min(fillAlpha + 0.2, 0.8);
            strokeColor = '#fff';
        }

        ctx.globalAlpha = alpha;

        // Glow
        if (n.id === activeGenome) {
            ctx.shadowColor = n.color;
            ctx.shadowBlur = 20;
        }

        // Fill
        ctx.beginPath();
        ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
        ctx.fillStyle = n.color;
        ctx.globalAlpha = alpha * fillAlpha;
        ctx.fill();

        // Stroke
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = strokeColor;
        ctx.lineWidth = n.id === activeGenome ? 2 : 1;
        ctx.stroke();

        ctx.shadowBlur = 0;

        // Label
        ctx.globalAlpha = alpha * textAlpha;
        ctx.fillStyle = '#fff';
        ctx.font = `${n.id === activeGenome ? '600' : '400'} ${textSize}px 'JetBrains Mono', monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        const label = n.genome.name.length > 16 ? n.genome.name.slice(0, 14) + '…' : n.genome.name;
        ctx.fillText(label, n.x, n.y + r + 4);

        ctx.globalAlpha = 1;
    });

    ctx.restore();
}

// ────────────────────────────────────────────
// GRAPH INTERACTION
// ────────────────────────────────────────────
function getNodeAt(mx, my) {
    const x = (mx - panX) / zoom;
    const y = (my - panY) / zoom;
    for (let i = nodes.length - 1; i >= 0; i--) {
        const n = nodes[i];
        const dx = x - n.x, dy = y - n.y;
        if (dx * dx + dy * dy < (n.radius + 4) * (n.radius + 4)) return n;
    }
    return null;
}

canvas.addEventListener('mousedown', e => {
    isDragging = false;
    dragStartX = e.offsetX;
    dragStartY = e.offsetY;
    startPanX = panX;
    startPanY = panY;
});

canvas.addEventListener('mousemove', e => {
    if (e.buttons === 1) {
        const dx = e.offsetX - dragStartX;
        const dy = e.offsetY - dragStartY;
        if (Math.abs(dx) + Math.abs(dy) > 4) isDragging = true;
        if (isDragging) {
            panX = startPanX + dx;
            panY = startPanY + dy;
            renderGraph();
        }
    } else {
        const node = getNodeAt(e.offsetX, e.offsetY);
        const newHover = node ? node.id : null;
        if (newHover !== hoveredNode) {
            hoveredNode = newHover;
            canvas.style.cursor = hoveredNode ? 'pointer' : 'grab';
            renderGraph();
        }
    }
});

canvas.addEventListener('mouseup', e => {
    if (!isDragging) {
        const node = getNodeAt(e.offsetX, e.offsetY);
        if (node) {
            selectGenome(node.id);
        } else {
            selectGenome(null);
        }
    }
    isDragging = false;
});

canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY > 0 ? 0.92 : 1.08;
    const mx = e.offsetX, my = e.offsetY;
    panX = mx - (mx - panX) * factor;
    panY = my - (my - panY) * factor;
    zoom *= factor;
    zoom = Math.max(0.3, Math.min(3, zoom));
    renderGraph();
}, { passive: false });

// Touch support
let lastTouchDist = null;
canvas.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
        isDragging = false;
        dragStartX = e.touches[0].clientX;
        dragStartY = e.touches[0].clientY;
        startPanX = panX; startPanY = panY;
    } else if (e.touches.length === 2) {
        lastTouchDist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
        );
    }
}, { passive: true });

canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1) {
        const dx = e.touches[0].clientX - dragStartX;
        const dy = e.touches[0].clientY - dragStartY;
        if (Math.abs(dx) + Math.abs(dy) > 4) isDragging = true;
        panX = startPanX + dx; panY = startPanY + dy;
        renderGraph();
    } else if (e.touches.length === 2) {
        const dist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
        );
        if (lastTouchDist) {
            const factor = dist / lastTouchDist;
            zoom = Math.max(0.3, Math.min(3, zoom * factor));
            renderGraph();
        }
        lastTouchDist = dist;
    }
}, { passive: false });

canvas.addEventListener('touchend', e => {
    if (!isDragging && e.changedTouches.length === 1) {
        const rect = canvas.getBoundingClientRect();
        const tx = e.changedTouches[0].clientX - rect.left;
        const ty = e.changedTouches[0].clientY - rect.top;
        const node = getNodeAt(tx, ty);
        if (node) selectGenome(node.id);
        else selectGenome(null);
    }
    isDragging = false;
    lastTouchDist = null;
});

// ────────────────────────────────────────────
// SELECT GENOME — Render Detail Panel
// ────────────────────────────────────────────
function selectGenome(id) {
    activeGenome = id;
    renderGraph();

    const panel = document.getElementById('detail-panel');
    const empty = document.getElementById('empty-state');

    if (!id) {
        panel.innerHTML = '';
        panel.appendChild(empty);
        empty.style.display = 'flex';
        return;
    }

    // Auto-switch to detail view on mobile when a genome is selected
    if (isMobileQuery.matches) {
        setMobileView('detail');
    }

    const g = registry.genomes.find(g => g.id === id);
    if (!g) return;

    const fam = registry.families[g.family] || { name: g.family, color: '#555', icon: '?' };
    const paths = Array.isArray(g.path) ? g.path : (g.path ? [g.path] : []);
    const statusClass = g.status === 'active' ? 'status-active' : 'status-dormant';

    // Build open-file links for each path
    const openLinks = paths.map(p => {
        const url = pathToUrl(p);
        return `<a class="open-btn" href="${url}" target="_blank" rel="noopener">
            ↗ ${p.split('/').pop()}
        </a>`;
    }).join('');

    // Path display with links
    const pathHtml = paths.map(p => {
        const url = pathToUrl(p);
        return `<a class="path-link" href="${url}" target="_blank" rel="noopener">${p}</a>`;
    }).join('');

    let html = `
        <div class="genome-header">
            <div class="genome-header-top">
                <div>
                    <div class="genome-family-badge" style="background:${fam.color}22;color:${fam.color};border:1px solid ${fam.color}44">
                        ${fam.icon} ${fam.name}
                    </div>
                    <div class="genome-name">${g.name}</div>
                    <div class="genome-path">
                        ${pathHtml || '<span style="color:var(--text-dim)">no path</span>'}
                        <span class="genome-status ${statusClass}">${g.status || 'active'}</span>
                    </div>
                </div>
                <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
                    ${openLinks}
                </div>
            </div>
            <div class="genome-desc">${g.description}</div>
        </div>
    `;

    // Codon sequence
    if (g.sequence && g.sequence.length) {
        html += `<div class="codon-section">`;
        html += `<div class="section-label">DNA Sequence — ${g.sequence.length} codons</div>`;
        g.sequence.forEach(c => {
            const stateClass = c.state === 'active' ? 'state-active' : 'state-dormant';
            const richPayload = enrichPayload(c.codon, c.payload);
            html += `
                <div class="codon-row">
                    <div class="codon-badge codon-${c.codon}">${c.codon}</div>
                    <div class="codon-payload">${richPayload}</div>
                    <div class="codon-state ${stateClass}">${c.state}</div>
                </div>
            `;
        });
        html += `</div>`;
    }

    // Find connections
    const incomingEdges = registry.edges.filter(e => e.to === id);
    const outgoingEdges = registry.edges.filter(e => e.from === id);

    // Connections
    if (incomingEdges.length || outgoingEdges.length) {
        html += `<div class="connections-section">`;
        if (outgoingEdges.length) {
            html += `<div class="section-label" style="border:none;padding:0;margin-bottom:6px">↓ DEPENDS ON</div>`;
            html += `<div class="conn-grid">`;
            outgoingEdges.forEach(e => {
                const target = registry.genomes.find(g => g.id === e.to);
                const label = target ? target.name : e.to;
                const famTarget = target ? registry.families[target.family] : null;
                const famColor = famTarget ? famTarget.color : '#555';
                html += `<span class="conn-chip type-${e.type}" data-genome="${e.to}" style="cursor:pointer">
                    <span style="color:${famColor};font-size:11px">${famTarget ? famTarget.icon : '?'}</span>
                    ${label}
                    <span class="conn-type-label">${e.type}${e.label ? ' · ' + e.label : ''}</span>
                </span>`;
            });
            html += `</div>`;
        }
        if (incomingEdges.length) {
            html += `<div class="section-label" style="border:none;padding:0;margin:12px 0 6px">↑ USED BY</div>`;
            html += `<div class="conn-grid">`;
            incomingEdges.forEach(e => {
                const source = registry.genomes.find(g => g.id === e.from);
                const label = source ? source.name : e.from;
                const famSource = source ? registry.families[source.family] : null;
                const famColor = famSource ? famSource.color : '#555';
                html += `<span class="conn-chip type-${e.type}" data-genome="${e.from}" style="cursor:pointer">
                    <span style="color:${famColor};font-size:11px">${famSource ? famSource.icon : '?'}</span>
                    ${label}
                    <span class="conn-type-label">${e.type}${e.label ? ' · ' + e.label : ''}</span>
                </span>`;
            });
            html += `</div>`;
        }
        html += `</div>`;
    }

    panel.innerHTML = html;

    // Bind connection chip clicks
    panel.querySelectorAll('.conn-chip[data-genome]').forEach(chip => {
        chip.addEventListener('click', () => {
            const targetId = chip.dataset.genome;
            const targetNode = nodes.find(n => n.id === targetId);
            selectGenome(targetId);
            if (targetNode) centerOnNode(targetNode);
        });
    });
}

const isMobileQuery = window.matchMedia('(max-width: 900px)');
let currentMobileView = 'detail';

function setMobileView(view) {
    currentMobileView = view;
    const graphPanel = document.querySelector('.graph-panel');
    const detailPanel = document.querySelector('.detail-panel');
    const mvList = document.getElementById('mv-list');
    const mvGraph = document.getElementById('mv-graph');

    graphPanel.classList.toggle('mobile-active', view === 'graph');
    detailPanel.classList.toggle('mobile-active', view === 'detail');
    mvList.classList.toggle('active', view === 'detail');
    mvGraph.classList.toggle('active', view === 'graph');

    if (view === 'graph') {
        // Recalculate graph on show since canvas may have been hidden
        buildGraphNodes();
        renderGraph();
    }
}

document.getElementById('mv-list').onclick = () => setMobileView('detail');
document.getElementById('mv-graph').onclick = () => setMobileView('graph');

// Initialize mobile state
function initMobileState() {
    if (isMobileQuery.matches) {
        setMobileView('detail');
    }
}

// Re-init on orientation change / resize
isMobileQuery.addEventListener('change', () => {
    if (isMobileQuery.matches) {
        setMobileView(currentMobileView);
    } else {
        // Desktop: remove mobile-active classes, both panels visible
        document.querySelector('.graph-panel').classList.remove('mobile-active');
        document.querySelector('.detail-panel').classList.remove('mobile-active');
    }
});

initMobileState();

function buildSiteMap() {
    const body = document.getElementById('sitemap-body');
    body.innerHTML = '';
    SITEMAP.forEach(group => {
        const el = document.createElement('div');
        el.className = 'sitemap-group';

        // Count external vs local
        const externalCount = group.links.filter(l => l.external).length;

        const header = document.createElement('div');
        header.className = 'sitemap-group-header';
        header.innerHTML = `
            <span class="sitemap-group-icon">${group.icon}</span>
            <span>${group.name}</span>
            ${externalCount === group.links.length ? '<span style="font-size:7px;color:var(--text-dim);margin-left:4px">DEV SERVER</span>' : ''}
            <span class="sitemap-group-count">${group.links.length}</span>
            <span class="sitemap-group-chevron">▼</span>
        `;
        header.onclick = () => el.classList.toggle('collapsed');
        el.appendChild(header);

        const linksEl = document.createElement('div');
        linksEl.className = 'sitemap-links';
        group.links.forEach(link => {
            const a = document.createElement('a');
            a.className = 'sitemap-link' + (link.current ? ' is-current' : '') + (link.external ? ' is-external' : '');
            a.href = link.href;
            a.target = link.current ? '_self' : '_blank';
            a.rel = 'noopener';
            a.innerHTML = `
                <span class="sitemap-link-dot" style="background:${link.external ? 'var(--text-dim)' : group.color}"></span>
                <span class="sitemap-link-name">${link.name}</span>
                ${link.external ? '<span class="sitemap-link-ext" style="color:var(--text-dim)">↗ dev</span>' : ''}
                ${link.desc && !link.external ? `<span class="sitemap-link-ext">${link.desc}</span>` : ''}
            `;
            linksEl.appendChild(a);
        });
        el.appendChild(linksEl);
        body.appendChild(el);
    });
}

function toggleSiteMap(open) {
    const drawer = document.getElementById('sitemap-drawer');
    const backdrop = document.getElementById('sitemap-backdrop');
    const isOpen = typeof open === 'boolean' ? open : !drawer.classList.contains('open');
    drawer.classList.toggle('open', isOpen);
    backdrop.classList.toggle('open', isOpen);
}

document.getElementById('sitemap-toggle').onclick = () => toggleSiteMap();
document.getElementById('sitemap-close').onclick = () => toggleSiteMap(false);
document.getElementById('sitemap-backdrop').onclick = () => toggleSiteMap(false);
document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && document.getElementById('sitemap-drawer').classList.contains('open')) {
        toggleSiteMap(false);
    }
    if (e.key === 'm' && !e.metaKey && !e.ctrlKey && !e.altKey && document.activeElement.tagName !== 'INPUT') {
        toggleSiteMap();
    }
});
