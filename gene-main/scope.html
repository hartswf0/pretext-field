<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENOMA SCOPE (Component v2.1 - Final)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Roboto+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* --- BASE SCOPE STYLES --- */
        :root {
            /* Scope Theme */
            --scope-bg-color: #0a0c10;
            --scope-text-color: #c9d1d9;
            --scope-glow-color: hsla(190, 100%, 75%, 0.4);
            --scope-focus-color: hsla(210, 100%, 80%, 0.1);
            --scope-grid-color: rgba(40, 50, 70, 0.2);
            --scope-font-mono: 'Fira Code', monospace;

            /* Editor Theme Variables (for consistent rendering) */
            --bg-color-dark: #21252b;
            --main-text-color: #e0e0e0;
            --border-color: #2a2a3a;
            --accent-color: #00faff;
            --accent-glow: rgba(0, 250, 255, 0.3);
            --intron-color: #444;
            --font-family: 'Roboto Mono', monospace;
            
            /* Editor Codon Colors */
            --color-txt: #4caf50; --color-hpl: #2196f3; --color-img: #ff9800;
            --color-auc: #9c27b0; --color-vid: #f44336; --color-cmt: #795548;
            --color-sty: #607d8b; --color-cde: #cddc39;
            --color-row_s: #9e9e9e; --color-col_s: #78909c; --color-end: #ff5722;

            /* Scope-Specific Layout Vars */
            --width-col-edge: 50px; --width-col-center: 75px; --gap-col-center: 16px;
            --height-codon-band: 24px; --scale-hover: 1.05; --scale-gaze: 1.1;
            --anim-fast: 150ms; --anim-smooth: 350ms;
        }

        /* Codon band colors are now set directly via JS using the Editor's CSS variables for consistency. */

        * { box-sizing: border-box; } html { height: 100%; }
        body { height: 100%; margin: 0; background-color: var(--scope-bg-color); color: var(--scope-text-color);
            font-family: var(--scope-font-mono); display: flex; flex-direction: column; justify-content: center;
            align-items: center; overflow: hidden; background-image: linear-gradient(var(--scope-grid-color) 1px, transparent 1px),
            linear-gradient(90deg, var(--scope-grid-color) 1px, transparent 1px); background-size: 60px 60px;
        }
        .scope-container { width: 100%; max-width: 1800px; height: 85vh; display: flex; flex-direction: column; gap: 20px;}
        #genome-field { flex-grow: 1; display: flex; align-items: center; gap: 4px; padding: 30px 5vw 0 5vw; /* Add top padding to prevent clipping */ overflow-x: auto;
            overflow-y: hidden; scroll-behavior: smooth; scroll-snap-type: x mandatory; -ms-overflow-style: none; scrollbar-width: none;
        }
        #genome-field::-webkit-scrollbar { display: none; }
        .genome-column { position: relative; flex-shrink: 0; display: flex; flex-direction: column; gap: 4px; height: 98%;
            width: var(--width-col-edge); padding: 10px 0; border-radius: 6px; cursor: pointer; scroll-snap-align: center;
            transition: width var(--anim-smooth) ease, min-width var(--anim-smooth) ease, transform var(--anim-fast) ease,
            background-color var(--anim-smooth) ease, box-shadow var(--anim-smooth) ease, margin-left var(--anim-smooth) ease, border-color var(--anim-smooth) ease;
            border: 1px solid transparent;
        }
        .genome-column.in-central-zone { width: var(--width-col-center); margin-left: var(--gap-col-center); }
        .genome-column.in-gaze-zone .codon-band { transform: scale(var(--scale-gaze)); }
        .genome-column.is-focused { transform: scale(var(--scale-hover)); box-shadow: 0 0 25px 5px var(--scope-glow-color); background-color: var(--scope-focus-color); }
        .genome-column.is-focused .genome-id-tag { opacity: 1; transform: translateY(-10px); }
        .genome-column.is-inspected { width: 450px; max-width: 450px; background-color: rgba(10,12,16,0.9); backdrop-filter: blur(8px);
            cursor: default; padding: 20px; align-items: flex-start; border-color: var(--accent-color);
        }

        .codon-band-container { display:flex; flex-direction:column; gap:2px; width:100%; height:100%; overflow-y: hidden; }
        .codon-band {
            width: 100%;
            height: 22px; /* Fixed height for stability */
            min-height: 22px;
            flex-shrink: 0;
            border-radius: 3px;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative; /* For stacking labels */
            transition: all var(--anim-fast) ease-in-out;
        }
        .codon-band-abbr {
            position: absolute;
            font-weight: 600;
            color: rgba(0,0,0,0.85);
            transition: opacity var(--anim-fast) ease-in-out;
            font-size: 0.75rem;
            opacity: 0; /* Hidden by default for ALL types */
        }
        .codon-band:hover .codon-band-abbr {
            opacity: 1; /* Show abbreviation on hover */
        }
        .codon-band.is-intron {
            background-color: transparent !important;
            border: 1px solid var(--scope-grid-color);
        }

        .genome-id-tag { position: absolute; top: -10px; /* Moved higher */ left: 50%; transform: translateX(-50%) translateY(-10px);
            background-color: var(--scope-text-color); color: var(--scope-bg-color);
            padding: 3px 10px; border-radius: 4px; font-size: 0.9rem; font-weight: 600; opacity: 0;
            transition: opacity var(--anim-smooth) ease, transform var(--anim-smooth) ease;
            white-space: nowrap; z-index: 10;
        }
        .genome-column:hover .genome-id-tag {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .inspected-content { display: flex; flex-direction: column; width: 100%; height: 100%; font-family: var(--font-family); }
        .inspected-header { font-size: 1.2rem; font-weight: 700; color: var(--accent-color); padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid var(--scope-grid-color); }
        .inspected-codon-list { flex-grow: 1; overflow-y: auto; padding-right: 10px; margin-right: -10px; max-height: 60vh; }
        
        /* These are the key styles for visual consistency */
        .inspected-content .codon { display: flex; align-items: center; padding: 8px 12px; border-radius: 3px; border: 1px solid transparent; font-weight: 700; color: var(--main-text-color); }
        .inspected-content .drag-handle { cursor: grab; padding: 0 10px 0 5px; user-select: none; color: var(--border-color); }
        .inspected-content .codon-type { padding: 3px 6px; border-radius: 2px; color: #000; margin-right: 15px; font-size: 0.9em; min-width: 45px; text-align: center; user-select: none; }
        .inspected-content .codon-payload { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 300; flex-grow: 1; }
        .inspected-content .codon.intron { opacity: 0.4; }
        .inspected-content .codon.intron .codon-type { background-color: var(--intron-color) !important; text-decoration: line-through;}

        .inspected-actions { margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--scope-grid-color); }
        .view-in-editor-btn { width: 100%; padding: 10px 15px; font-family: var(--font-family); font-weight: 700; cursor: pointer; background-color: transparent;
            border: 1px solid var(--accent-color); color: var(--accent-color); transition: all 0.2s ease;
        }
        .view-in-editor-btn:hover { background-color: var(--accent-color); color: var(--bg-color-dark); box-shadow: 0 0 10px var(--accent-glow); }

        /* Custom tooltip removed in favor of integrated hover effects. */
        .inspected-codon-list::-webkit-scrollbar { width: 6px; }
        .inspected-codon-list::-webkit-scrollbar-track { background: transparent; }
        .inspected-codon-list::-webkit-scrollbar-thumb { background: var(--scope-grid-color); border-radius: 3px;}

        /* New Header Styles */
        .scope-header { display: flex; justify-content: space-between; align-items: center; padding: 0 5vw 10px; width: 100%; color: var(--scope-text-color);}
        .scope-header h1 { font-size: 1.4rem; margin: 0; font-weight: 500;}
        .scope-btn { font-family: var(--scope-font-mono); font-weight: 700; cursor: pointer; background-color: transparent; border: 1px solid var(--scope-text-color); color: var(--scope-text-color); padding: 8px 15px; border-radius: 4px; transition: all 0.2s ease; }
        .scope-btn:hover { background-color: var(--scope-text-color); color: var(--scope-bg-color); }

        .inspected-info {
            padding: 1rem;
            background-color: rgba(255,255,255,0.05);
            border-radius: 8px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .inspected-header {
            font-weight: 700;
            font-size: 1.1rem;
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--scope-grid-color);
            word-break: break-all;
        }
        .inspected-actions {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .inspected-actions button {
            width: 100%;
            padding: 0.75rem;
            font-family: var(--scope-font-mono);
            font-weight: 700;
            cursor: pointer;
            background-color: var(--button-bg);
            border: 1px solid var(--border-color);
            color: var(--main-text-color);
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        .inspected-actions button:hover {
            background-color: var(--button-bg-hover);
        }

        .inspected-codon-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 0.5rem;
            margin-bottom: 1rem;
            background-color: rgba(0,0,0,0.2);
            border-radius: 4px;
            min-height: 100px; /* Ensure it has some height even if empty */
        }
        .inspected-codon-list::-webkit-scrollbar { width: 6px; }
        .inspected-codon-list::-webkit-scrollbar-track { background: transparent; }
        .inspected-codon-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px;}

        .codon {
            display: flex;
            align-items: center;
            padding: 4px 8px;
            border-radius: 3px;
            margin-bottom: 4px;
            font-size: 0.9rem;
        }
        .codon.intron {
            opacity: 0.5;
            background-color: transparent !important;
            border: 1px dashed var(--border-color);
        }
        .codon-type {
            padding: 2px 6px;
            border-radius: 3px;
            margin-right: 10px;
            font-weight: 700;
            font-size: 0.8rem;
            color: #000;
        }
        .codon-payload {
            font-family: var(--scope-font-mono);
            white-space: pre-wrap;
            word-break: break-all;
            color: var(--main-text-color-subtle);
        }

        /* Phenotype Preview Modal */
        #phenotype-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        #phenotype-modal.visible {
            display: flex;
        }
        .phenotype-container {
            background-color: var(--bg-color-dark);
            color: var(--main-text-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            width: 80%;
            max-width: 900px;
            height: 70%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .phenotype-container::-webkit-scrollbar {
            width: 8px;
        }
        .phenotype-container::-webkit-scrollbar-track {
            background: var(--bg-color-dark);
        }
        .phenotype-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        #close-modal-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--main-text-color);
            cursor: pointer;
            opacity: 0.7;
            transition: opacity var(--anim-fast);
        }
        #close-modal-btn:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="scope-container" id="scope-root">
        <div class="scope-header">
            <h1>GENOMA SCOPE</h1>
            <button id="import-genome-btn" class="scope-btn">Import Genome</button>
        </div>
        <div id="genome-field"></div>

        <div id="phenotype-modal">
            <div class="phenotype-container">
                <button id="close-modal-btn">&times;</button>
                <div id="phenotype-output"></div>
            </div>
        </div>

        <input type="file" id="import-genome-input" style="display: none;" accept=".json" multiple>

    <script>
        const CODON_TYPES = {
            'TXT': { color: 'var(--color-txt)', name: 'Text Block' }, 'HPL': { color: 'var(--color-hpl)', name: 'Hyperlink' },
            'IMG': { color: 'var(--color-img)', name: 'Image' }, 'AUC': { color: 'var(--color-auc)', name: 'Audio Clip' },
            'VID': { color: 'var(--color-vid)', name: 'Video' }, 'CMT': { color: 'var(--color-cmt)', name: 'Commentary' },
            'STY': { color: 'var(--color-sty)', name: 'Style Block' }, 'CDE': { color: 'var(--color-cde)', name: 'Code Snippet' },
            'ROW_S': { color: 'var(--color-row_s)', name: 'Row Start' }, 'COL_S': { color: 'var(--color-col_s)', name: 'Column Start' },
            'END': { color: 'var(--color-end)', name: 'Structure End' },
        };

        class GenomaScope {
            constructor(containerElement) {
                this.container = containerElement;
                this.genomeField = this.container.querySelector('#genome-field');
                this.fullGenomeData = [];
                this.focusedIndex = -1;
                this.inspectedIndex = -1;
                this._handleEvent = this._handleEvent.bind(this);

                this.modal = document.getElementById('phenotype-modal');
                this.modalOutput = document.getElementById('phenotype-output');
                this.closeModalBtn = document.getElementById('close-modal-btn');
            }

            loadData(genomeData) {
                this.fullGenomeData = genomeData;
                this._renderField();
                this._bindEvents();
                this._focusColumn(Math.floor(this.fullGenomeData.length / 2));
            }

            _bindEvents() {
                this.genomeField.addEventListener('click', this._handleEvent);
                this.genomeField.addEventListener('mouseover', this._handleEvent);
                document.addEventListener('keydown', this._handleEvent);
                this.closeModalBtn.addEventListener('click', () => this._hidePhenotype());
                this.modal.addEventListener('click', (e) => {
                    if (e.target === this.modal) this._hidePhenotype();
                });
            }

            _handleEvent(event) {
                const column = event.target.closest('.genome-column');
                const columnIndex = column ? +column.dataset.index : -1;

                switch (event.type) {
                    case 'click':
                        // This now only handles clicks on the column itself to inspect/collapse.
                        // Clicks on buttons inside are handled by their own dedicated listeners.
                        if (columnIndex !== -1) {
                            this._inspectColumn(columnIndex);
                        }
                        break;
                    case 'mouseover':
                        if (column && columnIndex !== this.focusedIndex) this._focusColumn(columnIndex);
                        break;
                    case 'keydown':
                        if (document.activeElement !== document.body && document.activeElement !== null) return;
                        if (event.key === 'ArrowRight') { event.preventDefault(); this._focusColumn(this.focusedIndex < this.fullGenomeData.length - 1 ? this.focusedIndex + 1 : 0); }
                        if (event.key === 'ArrowLeft') { event.preventDefault(); this._focusColumn(this.focusedIndex > 0 ? this.focusedIndex - 1 : this.fullGenomeData.length - 1); }
                        if (event.key === 'Enter') { event.preventDefault(); if (this.focusedIndex !== -1) this._inspectColumn(this.focusedIndex); }
                        if (event.key === 'Escape') {
                            event.preventDefault();
                            if (this.modal.classList.contains('visible')) {
                                this._hidePhenotype();
                            } else if (this.inspectedIndex !== -1) {
                                this._collapseColumn(this.inspectedIndex);
                            }
                        }
                        break;
                }
            }

            _renderField() {
                this.genomeField.innerHTML = '';
                this.fullGenomeData.forEach((genome, index) => {
                    const columnEl = this._createColumnElement(genome, index);
                    this.genomeField.appendChild(columnEl);
                });
            }

            _createColumnElement(genome, index) {
                const columnEl = document.createElement('div');
                columnEl.className = 'genome-column';
                columnEl.dataset.index = index;
                const tagEl = document.createElement('div');
                tagEl.className = 'genome-id-tag';
                tagEl.textContent = genome.genome_id;
                columnEl.appendChild(tagEl);
                columnEl.appendChild(this._renderCodonBands(genome.sequence));
                return columnEl;
            }

            _renderCodonBands(sequence) {
                const container = document.createElement('div');
                container.className = 'codon-band-container';
                sequence.forEach(codon => {
                    const bandEl = document.createElement('div');
                    bandEl.className = 'codon-band';
                    const typeInfo = CODON_TYPES[codon.type] || { name: 'Unknown', color: '#ccc' };
                    const abbrEl = document.createElement('span');
                    abbrEl.className = 'codon-band-abbr';
                    abbrEl.textContent = codon.type;
                    bandEl.appendChild(abbrEl);
                    if (codon.is_intron) {
                        bandEl.classList.add('is-intron');
                        abbrEl.style.color = 'var(--scope-text-color)';
                    } else {
                        bandEl.style.backgroundColor = typeInfo.color;
                    }
                    container.appendChild(bandEl);
                });
                return container;
            }

            _inspectColumn(index) {
                if (index === this.inspectedIndex) {
                    this._collapseColumn(index);
                    return;
                }
                if (this.inspectedIndex !== -1) {
                    this._collapseColumn(this.inspectedIndex);
                }
                this.inspectedIndex = index;
                const columnEl = this.genomeField.children[index];
                const genome = this.fullGenomeData[index];
                const infoEl = this._createInspectedInfoElement(genome);
                columnEl.innerHTML = '';
                columnEl.appendChild(infoEl);
                this._updateAllColumnClasses();
                columnEl.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }

            _createInspectedInfoElement(genome) {
                const infoEl = document.createElement('div');
                infoEl.className = 'inspected-info';

                const header = document.createElement('div');
                header.className = 'inspected-header';
                header.textContent = genome.genome_id;
                infoEl.appendChild(header);

                const listContainer = document.createElement('div');
                listContainer.className = 'inspected-codon-list';
                genome.sequence.forEach(codon => {
                    const typeInfo = CODON_TYPES[codon.type] || { name: 'Unknown', color: '#ccc' };
                    const codonEl = document.createElement('div');
                    codonEl.className = 'codon';
                    if (codon.is_intron) { codonEl.classList.add('intron'); }
                    const typeEl = document.createElement('span');
                    typeEl.className = 'codon-type';
                    typeEl.textContent = codon.type;
                    typeEl.style.backgroundColor = typeInfo.color;
                    const payloadEl = document.createElement('span');
                    payloadEl.className = 'codon-payload';
                    payloadEl.textContent = codon.payload || '';
                    codonEl.appendChild(typeEl);
                    codonEl.appendChild(payloadEl);
                    listContainer.appendChild(codonEl);
                });
                infoEl.appendChild(listContainer);

                const actions = document.createElement('div');
                actions.className = 'inspected-actions';
                
                const viewButton = document.createElement('button');
                viewButton.className = 'view-in-editor-btn';
                viewButton.textContent = 'View in Editor';
                viewButton.addEventListener('click', (event) => {
                    event.stopPropagation();
                    const selectedGenomeId = this.fullGenomeData[this.inspectedIndex].genome_id;
                    const scopeSessionData = {
                        allGenomes: this.fullGenomeData,
                        selectedId: selectedGenomeId
                    };
                    sessionStorage.setItem('scopeSessionData', JSON.stringify(scopeSessionData));
                    window.open('editor.html', '_blank');
                });
                actions.appendChild(viewButton);

                const previewButton = document.createElement('button');
                previewButton.className = 'preview-phenotype-btn';
                previewButton.textContent = 'Preview Phenotype';
                previewButton.addEventListener('click', (event) => {
                    event.stopPropagation();
                    this._previewPhenotype(this.inspectedIndex);
                });
                actions.appendChild(previewButton);

                infoEl.appendChild(actions);
                return infoEl;
            }

            _collapseColumn(index) {
                if (index < 0) return;
                this.inspectedIndex = -1;
                const columnEl = this.genomeField.children[index];
                const genome = this.fullGenomeData[index];
                columnEl.innerHTML = '';
                const tagEl = document.createElement('div');
                tagEl.className = 'genome-id-tag';
                tagEl.textContent = genome.genome_id;
                columnEl.appendChild(tagEl);
                columnEl.appendChild(this._renderCodonBands(genome.sequence));
                this._updateAllColumnClasses();
            }

            _focusColumn(index) {
                if (index < 0 || index >= this.fullGenomeData.length) return;
                this.focusedIndex = index;
                const columnEl = this.genomeField.children[index];
                if (columnEl && this.inspectedIndex === -1) {
                    columnEl.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
                this._updateAllColumnClasses();
            }

            _updateAllColumnClasses() {
                this.genomeField.querySelectorAll('.genome-column').forEach((col, i) => {
                    col.classList.toggle('is-focused', i === this.focusedIndex && i !== this.inspectedIndex);
                    col.classList.toggle('is-inspected', i === this.inspectedIndex);
                });
                this.genomeField.classList.toggle('is-inspecting', this.inspectedIndex !== -1);
            }

            _previewPhenotype(index) {
                if (index < 0 || index >= this.fullGenomeData.length) return;
                const genome = this.fullGenomeData[index];
                const splicedSequence = this._spliceGenome(genome.sequence);
                const phenotypeHtml = this._translate(splicedSequence);
                this.modalOutput.innerHTML = phenotypeHtml;
                this.modal.classList.add('visible');
                document.body.style.overflow = 'hidden';
            }

            _hidePhenotype() {
                this.modal.classList.remove('visible');
                this.modalOutput.innerHTML = '';
                document.body.style.overflow = '';
            }

            _spliceGenome(sequence) {
                return sequence.filter(codon => !codon.is_intron);
            }

            _escapeHtml(unsafe) {
                return unsafe
                    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
            }

            _translate(splicedSequence) {
                let html = '';
                let i = 0;
                while (i < splicedSequence.length) {
                    const codon = splicedSequence[i];
                    const payload = codon.payload || '';
                    const safePayload = this._escapeHtml(payload);
                    switch (codon.type) {
                        case 'TXT': html += `<p>${safePayload.replace(/\n/g, '<br>')}</p>`; break;
                        case 'HPL':
                            const url = payload.startsWith('http') ? payload : 'https://' + payload;
                            html += `<a href="${this._escapeHtml(url)}" target="_blank">${safePayload}</a>`; break;
                        case 'IMG': html += `<img src="${this._escapeHtml(payload)}" alt="IMG codon" style="max-width:100%; height:auto; border-radius: 4px;">`; break;
                        case 'AUC': html += `<audio controls src="${this._escapeHtml(payload)}"></audio>`; break;
                        case 'VID': html += `<video controls src="${this._escapeHtml(payload)}" style="max-width:100%;"></video>`; break;
                        case 'CMT': break;
                        case 'STY': html += `<style>${payload}</style>`; break;
                        case 'CDE': html += `<pre><code class="language-js">${safePayload}</code></pre>`; break;
                        case 'ROW_S': html += '<div style="display:flex; flex-direction:row; gap:1rem; align-items:flex-start;">'; break;
                        case 'COL_S': html += '<div style="display:flex; flex-direction:column; gap:1rem; flex:1;">'; break;
                        case 'END': html += '</div>'; break;
                    }
                    i++;
                }
                return html;
            }

            addGenome(newGenome) {
                if (!newGenome || !newGenome.genome_id || !newGenome.sequence) {
                    alert('Invalid genome file. Must contain genome_id and sequence.'); return;
                }
                const isDuplicate = this.fullGenomeData.some(g => g.genome_id === newGenome.genome_id);
                if (isDuplicate) {
                    alert(`A genome with ID "${newGenome.genome_id}" already exists in the scope.`); return;
                }
                this.fullGenomeData.push(newGenome);
                this._renderField();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const scopeContainer = document.getElementById('scope-root');
            const scopeComponent = new GenomaScope(scopeContainer);
            const realEditorGenomes = [
                {"genome_id": "gX-404a", "sequence": [
                    { "type": "STY", "payload": "font-style: italic; color: #a0c4ff;", "is_intron": false }, { "type": "TXT", "payload": "The future is layered.", "is_intron": false },
                    { "type": "IMG", "payload": "https://picsum.photos/seed/future/400/200", "is_intron": false }, { "type": "CMT", "payload": "This image is procedurally generated.", "is_intron": true },
                    { "type": "HPL", "payload": "https://en.wikipedia.org/wiki/Information_theory", "is_intron": false },
                ]},
                {"genome_id": "gX-99b", "sequence": [
                    { "type": "TXT", "payload": "## Spec: Quantum Comms Unit", "is_intron": false }, { "type": "CDE", "payload": "const pair = new EntangledPair('Bell');", "is_intron": false },
                    { "type": "CMT", "payload": "Proof-of-concept only.", "is_intron": false }, { "type": "IMG", "payload": "https://picsum.photos/seed/circuit/400/150", "is_intron": false },
                ]},
                {"genome_id": "gX-layout-demo", "sequence": [
                    { "type": "ROW_S", "payload": "display: flex; gap: 15px;", "is_intron": false }, { "type": "COL_S", "payload": "flex: 1;", "is_intron": false },
                    { "type": "TXT", "payload": "First column.", "is_intron": false }, { "type": "IMG", "payload": "https://picsum.photos/seed/column1/300/150", "is_intron": false },
                    { "type": "END", "payload": "", "is_intron": false }, { "type": "COL_S", "payload": "flex: 2;", "is_intron": false },
                    { "type": "TXT", "payload": "Second, wider column.", "is_intron": false }, { "type": "END", "payload": "", "is_intron": false }, { "type": "END", "payload": "", "is_intron": false }
                ]}
            ];
            scopeComponent.loadData(realEditorGenomes);

            const importBtn = document.getElementById('import-genome-btn');
            const importInput = document.getElementById('import-genome-input');
            importBtn.addEventListener('click', () => importInput.click());
            importInput.addEventListener('change', (event) => {
                if (!event.target.files) return;
                const files = Array.from(event.target.files);
                files.forEach(file => {
                    if (file.type === 'application/json') {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            try {
                                const newGenome = JSON.parse(e.target.result);
                                scopeComponent.addGenome(newGenome);
                            } catch (err) {
                                alert(`Error parsing ${file.name}: ${err.message}`);
                            }
                        };
                        reader.readAsText(file);
                    } else {
                        alert(`Skipping non-JSON file: ${file.name}`);
                    }
                });
                event.target.value = null;
            });
        });
    </script>
</body>
