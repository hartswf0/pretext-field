<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Bat Echo — Find the poem in the dark. Pretext-powered echolocation typography.">
  <title>BAT ECHO — PRETEXT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=JetBrains+Mono:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      color-scheme: dark;
      --void: #030304;
      --echo: #00ffcc;
      --echo-dim: rgba(0,255,204,0.08);
      --bone: #e8dcc8;
      --amber: #ff8c00;
      --ui: 'JetBrains Mono', monospace;
      --serif: 'Cormorant Garamond', Georgia, serif;
    }
    html, body {
      height: 100%; overflow: hidden;
      background: var(--void);
      font-family: var(--ui);
      color: var(--echo);
      cursor: crosshair;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Boot */
    #boot-screen {
      position: fixed; inset: 0; z-index: 10000;
      background: var(--void);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: 20px;
      animation: flick 0.15s infinite alternate;
    }
    @keyframes flick { 0% { opacity: 0.93; } 100% { opacity: 1; } }
    .boot-title {
      font: 300 24px var(--ui);
      letter-spacing: 8px; text-transform: uppercase;
      color: var(--echo);
      text-shadow: 0 0 30px rgba(0,255,204,0.4);
    }
    .boot-sub {
      font: 300 11px var(--ui);
      color: rgba(0,255,204,0.4);
      letter-spacing: 2px; line-height: 2;
      text-align: center;
    }
    .boot-btn {
      margin-top: 16px;
      background: transparent;
      border: 1px solid var(--echo);
      color: var(--echo);
      padding: 12px 32px;
      font: 300 12px var(--ui);
      letter-spacing: 4px; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
    }
    .boot-btn:hover { background: var(--echo); color: #000; }

    /* Canvas */
    #game-canvas { position: fixed; inset: 0; width: 100%; height: 100%; }

    /* CRT */
    .crt {
      position: fixed; inset: 0; pointer-events: none; z-index: 100;
      background:
        linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.15) 50%),
        linear-gradient(90deg, rgba(0,255,204,0.02), rgba(0,0,0,0) 50%, rgba(0,255,204,0.02));
      background-size: 100% 2px, 3px 100%;
      opacity: 0.15;
    }

    /* HUD */
    .hud {
      position: fixed; z-index: 200; pointer-events: none;
      font: 200 10px var(--ui); letter-spacing: 1.5px;
    }
    .hud-tl { top: 16px; left: 16px; }
    .hud-tr { top: 16px; right: 16px; text-align: right; }
    .hud-bl { bottom: 16px; left: 16px; max-width: 320px; }
    .hud-label {
      color: rgba(0,255,204,0.35); font-size: 9px;
      letter-spacing: 2px; text-transform: uppercase;
    }
    .hud-value { color: var(--echo); margin-top: 3px; }

    /* Found lines log */
    #found-log {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 200; pointer-events: none;
      font: italic 300 15px var(--serif);
      color: var(--bone);
      text-align: center;
      max-width: 500px;
      line-height: 1.8;
      opacity: 0;
      transition: opacity 1.5s ease;
    }
    #found-log.visible { opacity: 1; }

    /* Found counter */
    #found-count {
      position: fixed; bottom: 16px; right: 16px;
      z-index: 200; pointer-events: none;
      font: 200 10px var(--ui);
      color: rgba(0,255,204,0.4);
      letter-spacing: 2px;
    }

    .controls-hint {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      z-index: 200; pointer-events: none;
      font: 200 10px var(--ui);
      color: rgba(0,255,204,0.3);
      letter-spacing: 2px; transition: opacity 3s;
    }

    @media (max-width: 600px) {
      .boot-title { font-size: 16px; letter-spacing: 4px; }
      #found-log { font-size: 13px; max-width: 280px; top: 50px; }
      .hud-bl { bottom: 80px; }
    }
  </style>
</head>
<body>
  <div id="boot-screen">
    <div class="boot-title">Bat Echo</div>
    <div class="boot-sub">
      ECHOLOCATION ENGINE READY<br>
      POEM FRAGMENTS SCATTERED IN DARKNESS<br>
      FIND THEM ALL
    </div>
    <button class="boot-btn" id="boot-btn">Enter the Cave</button>
  </div>

  <canvas id="game-canvas"></canvas>
  <div class="crt"></div>

  <div class="hud hud-tl">
    <div class="hud-label">Echo</div>
    <div class="hud-value" id="hud-echo">SILENCE</div>
  </div>
  <div class="hud hud-tr">
    <div class="hud-label">Position</div>
    <div class="hud-value" id="hud-pos">0, 0</div>
  </div>
  <div class="hud hud-bl">
    <div class="hud-label">Last Fragment</div>
    <div class="hud-value" id="hud-fragment" style="font-family:var(--serif);font-style:italic;font-size:12px;color:var(--bone);max-width:280px;line-height:1.6">—</div>
  </div>

  <div id="found-log"></div>
  <div id="found-count">0 / 12</div>

  <div class="controls-hint" id="controls-hint">
    WASD: MOVE · MOUSE: AIM · HOLD CLICK: ECHOLOCATE · SPACE: PULSE
  </div>

  <script type="module" src="./bat-echo.ts"></script>
</body>
</html>
