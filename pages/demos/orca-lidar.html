<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ORCA LiDAR Text Wrap — Pretext-powered typographical exploration engine">
  <title>ORCA // PRETEXT LIDAR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=JetBrains+Mono:wght@100;200;300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      color-scheme: dark;
      --bg: #050403;
      --amber: #ff8c00;
      --amber-dim: rgba(255,140,0,0.15);
      --cyan: #00ffcc;
      --cyan-dim: rgba(0,255,204,0.08);
      --gold: #daa520;
      --ui-font: 'JetBrains Mono', 'Courier New', monospace;
    }
    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: var(--ui-font);
      color: var(--amber);
      cursor: crosshair;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ── Boot Screen ── */
    #boot-screen {
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 24px;
      animation: bootFlicker 0.15s infinite alternate;
    }
    @keyframes bootFlicker {
      0% { opacity: 0.92; }
      100% { opacity: 1; }
    }
    .boot-title {
      font-size: 28px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--amber);
      text-shadow: 0 0 20px rgba(255,140,0,0.5);
    }
    .boot-sub {
      font-size: 12px;
      color: rgba(255,140,0,0.5);
      letter-spacing: 2px;
      line-height: 1.8;
      text-align: center;
    }
    .boot-btn {
      margin-top: 20px;
      background: transparent;
      border: 1px solid var(--amber);
      color: var(--amber);
      padding: 14px 36px;
      font-family: var(--ui-font);
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .boot-btn:hover {
      background: var(--amber);
      color: #000;
    }

    /* ── Main Canvas ── */
    #game-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── CRT Overlay ── */
    .crt {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      background:
        linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.2) 50%),
        linear-gradient(90deg, rgba(255,0,0,0.04), rgba(0,255,0,0.02), rgba(0,0,255,0.04));
      background-size: 100% 3px, 3px 100%;
      opacity: 0.12;
    }

    /* ── HUD ── */
    .hud {
      position: fixed;
      z-index: 200;
      pointer-events: none;
      font-size: 11px;
      letter-spacing: 1px;
    }
    .hud-tl {
      top: 16px;
      left: 16px;
    }
    .hud-tr {
      top: 16px;
      right: 16px;
      text-align: right;
    }
    .hud-bl {
      bottom: 16px;
      left: 16px;
    }
    .hud-br {
      bottom: 16px;
      right: 16px;
      text-align: right;
    }
    .hud-label {
      color: rgba(255,140,0,0.4);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .hud-value {
      color: var(--amber);
      margin-top: 2px;
    }
    .hud-scan {
      color: var(--cyan);
      margin-top: 6px;
      max-width: 300px;
      font-size: 10px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    /* ── Minimap ── */
    #minimap {
      position: fixed;
      bottom: 16px;
      right: 16px;
      width: 140px;
      height: 140px;
      border: 1px solid rgba(255,140,0,0.3);
      background: rgba(0,0,0,0.7);
      z-index: 200;
      image-rendering: pixelated;
    }

    /* ── Controls hint ── */
    .controls-hint {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      pointer-events: none;
      font-size: 10px;
      color: rgba(255,140,0,0.3);
      letter-spacing: 2px;
      transition: opacity 2s;
    }
  </style>
</head>
<body>
  <div id="boot-screen">
    <div class="boot-title">CULTURE // MIND // BRAIN</div>
    <div class="boot-sub">
      LOADING DISCIPLINARY MATRICES...<br>
      CALIBRATING SOMATIC MARKERS...<br>
      INITIALIZING PRETEXT LAYOUT CORE...<br>
      BREACHING CARTESIAN BOUNDARY...
    </div>
    <button class="boot-btn" id="boot-btn">Enter the Extended Mind</button>
    <div class="boot-sub" style="margin-top:8px;font-size:10px;opacity:0.3">AIM WITH MOUSE · PRESS SPACE TO FIRE LIGHT PULSE</div>
  </div>

  <canvas id="game-canvas"></canvas>
  <div class="crt"></div>

  <div class="hud hud-tl">
    <div class="hud-label">Zone</div>
    <div class="hud-value" id="hud-zone">—</div>
  </div>
  <div class="hud hud-tr">
    <div class="hud-label">Position</div>
    <div class="hud-value" id="hud-pos">0, 0</div>
  </div>
  <div class="hud hud-bl">
    <div class="hud-label">LiDAR Scan</div>
    <div class="hud-scan" id="hud-scan">STANDBY</div>
  </div>

  <canvas id="minimap"></canvas>

  <div class="controls-hint" id="controls-hint">
    WASD: MOVE &nbsp; MOUSE: AIM LIGHT &nbsp; SPACE: FIRE PULSE
  </div>

  <script type="module" src="./orca-lidar.ts"></script>
</body>
</html>
