<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICARO-QUINE · Code Is Image</title>
    <meta name="description" content="Self-referential renderer where BEFLIX source code characters become the pixels of the image they describe.">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23000'/%3E%3Ctext x='32' y='40' text-anchor='middle' fill='%2300ff88' font-family='monospace' font-size='36' font-weight='bold'%3EQ%3C/text%3E%3C/svg%3E">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Inter:wght@400;700;900&display=swap');

        :root {
            --bg: #0a0a0c;
            --surface: #111116;
            --surface-2: #1a1a22;
            --border: #2a2a35;
            --text: #c8c8d0;
            --text-dim: #666680;
            --accent: #00ff88;
            --accent-dim: #00cc6a;
            --accent-glow: rgba(0, 255, 136, 0.15);
            --warn: #ff4466;
            --code-font: 'JetBrains Mono', 'Courier New', monospace;
            --ui-font: 'Inter', -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: var(--ui-font);
            -webkit-font-smoothing: antialiased;
        }

        /* ── LAYOUT ── */
        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
            height: 100dvh;
        }

        #header {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            gap: 12px;
            z-index: 10;
        }

        #header h1 {
            font-family: var(--code-font);
            font-size: 14px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: nowrap;
        }

        /* ── BUTTONS ── */
        .btn {
            font-family: var(--code-font);
            font-size: 11px;
            font-weight: 700;
            padding: 6px 12px;
            border: 1px solid var(--border);
            background: var(--surface-2);
            color: var(--text);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            transition: all 0.12s;
            white-space: nowrap;
        }

        .btn:hover {
            background: var(--border);
            border-color: var(--text-dim);
        }

        .btn.accent {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        .btn.accent:hover {
            background: var(--accent-dim);
            border-color: var(--accent-dim);
        }

        .btn.active {
            background: var(--accent-glow);
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn:active {
            transform: scale(0.96);
        }

        /* ── MAIN AREA ── */
        #main {
            flex: 1 1 0%;
            display: flex;
            overflow: hidden;
        }

        /* ── SIDEBAR ── */
        #sidebar {
            flex: 0 0 320px;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border-right: 1px solid var(--border);
            overflow: hidden;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-label {
            font-family: var(--code-font);
            font-size: 9px;
            font-weight: 700;
            color: var(--text-dim);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        #script-area {
            flex: 1 1 0%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 0;
        }

        #script-editor {
            flex: 1 1 0%;
            width: 100%;
            resize: none;
            background: var(--bg);
            color: var(--accent);
            font-family: var(--code-font);
            font-size: 10px;
            line-height: 1.5;
            padding: 10px 12px;
            border: none;
            outline: none;
            overflow-y: auto;
            tab-size: 4;
        }

        #script-editor::placeholder {
            color: var(--text-dim);
        }

        #script-info {
            flex: 0 0 auto;
            padding: 6px 12px;
            background: var(--surface-2);
            border-top: 1px solid var(--border);
            font-family: var(--code-font);
            font-size: 9px;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
        }

        /* ── CANVAS ZONE ── */
        #canvas-zone {
            flex: 1 1 0%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            background: var(--bg);
        }

        #canvas-viewport {
            flex: 1 1 0%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #quine-canvas {
            image-rendering: auto;
            cursor: crosshair;
        }

        /* ── CONTROLS BAR ── */
        #controls-bar {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }

        #frame-display {
            font-family: var(--code-font);
            font-size: 12px;
            font-weight: 700;
            color: var(--accent);
            min-width: 80px;
            text-align: center;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .speed-control label {
            font-family: var(--code-font);
            font-size: 9px;
            color: var(--text-dim);
            letter-spacing: 0.1em;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 80px;
            height: 4px;
            background: var(--border);
            outline: none;
            border-radius: 2px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }

        .spacer {
            flex: 1;
        }

        /* ── ZOOM DISPLAY ── */
        #zoom-display {
            font-family: var(--code-font);
            font-size: 9px;
            color: var(--text-dim);
            padding: 4px 8px;
            background: var(--surface-2);
            border: 1px solid var(--border);
        }

        /* ── DROP ZONE ── */
        #drop-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 255, 136, 0.08);
            border: 3px dashed var(--accent);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        #drop-overlay.active {
            display: flex;
        }

        #drop-overlay span {
            font-family: var(--code-font);
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        /* ── TOAST ── */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--accent);
            color: var(--bg);
            font-family: var(--code-font);
            font-size: 12px;
            font-weight: 700;
            padding: 10px 20px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            z-index: 9999;
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ── MODE INDICATOR ── */
        .mode-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: var(--accent-glow);
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .mode-dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .mode-label {
            font-family: var(--code-font);
            font-size: 9px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.12em;
        }

        /* ── RENDER MODE TOGGLE ── */
        .toggle-group {
            display: flex;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .toggle-group .btn {
            border: none;
            border-right: 1px solid var(--border);
        }

        .toggle-group .btn:last-child {
            border-right: none;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            #sidebar {
                display: none;
            }
        }

        /* ── LOADING OVERLAY ── */
        #loading {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 500;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        #loading.active {
            display: flex;
        }

        #loading-msg {
            font-family: var(--code-font);
            font-size: 14px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        #loading-sub {
            font-family: var(--code-font);
            font-size: 11px;
            color: var(--text-dim);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- ── HEADER ── -->
        <div id="header">
            <h1>ICARO-QUINE</h1>
            <div class="mode-indicator">
                <div class="mode-dot"></div>
                <span class="mode-label">CODE = IMAGE</span>
            </div>
            <div class="header-controls">
                <div class="toggle-group">
                    <button class="btn active" id="mode-quine" onclick="setRenderMode('quine')">QUINE</button>
                    <button class="btn" id="mode-dots" onclick="setRenderMode('dots')">DOTS</button>
                </div>
                <button class="btn" onclick="document.getElementById('file-input').click()">LOAD SCRIPT</button>
                <button class="btn" onclick="document.getElementById('media-input').click()">LOAD IMAGE</button>
                <button class="btn" onclick="exportPNG()">PNG</button>
                <button class="btn" onclick="exportGIF()">GIF</button>
            </div>
        </div>

        <!-- ── MAIN ── -->
        <div id="main">
            <!-- ── SIDEBAR ── -->
            <div id="sidebar">
                <div class="sidebar-section">
                    <span class="sidebar-label">BEFLIX SCRIPT</span>
                    <div style="display:flex; gap:4px;">
                        <button class="btn accent" onclick="runScript()" style="flex:1;">▶ RUN</button>
                        <button class="btn" onclick="clearScript()">CLR</button>
                    </div>
                </div>
                <div id="script-area">
                    <textarea id="script-editor" spellcheck="false" placeholder="Paste BEFLIX-128 code here..."></textarea>
                    <div id="script-info">
                        <span id="line-count">0 LINES</span>
                        <span id="char-count">0 CHARS</span>
                    </div>
                </div>
            </div>

            <!-- ── CANVAS ── -->
            <div id="canvas-zone">
                <div id="drop-overlay"><span>DROP IMAGE OR SCRIPT</span></div>
                <div id="canvas-viewport">
                    <canvas id="quine-canvas"></canvas>
                </div>
                <div id="controls-bar">
                    <button class="btn" onclick="stepFrame(-1)">◄</button>
                    <button class="btn accent" id="play-btn" onclick="togglePlay()">▶ PLAY</button>
                    <button class="btn" onclick="stepFrame(1)">►</button>
                    <span id="frame-display">01/01</span>
                    <div class="speed-control">
                        <label>FPS</label>
                        <input type="range" id="fps-slider" min="1" max="30" value="12" oninput="setFPS(this.value)">
                        <span id="fps-val" style="font-family:var(--code-font);font-size:11px;color:var(--accent);min-width:20px;">12</span>
                    </div>
                    <div class="spacer"></div>
                    <span id="zoom-display">100%</span>
                    <button class="btn" onclick="zoomCanvas(-1)">−</button>
                    <button class="btn" onclick="zoomCanvas(1)">+</button>
                    <button class="btn" onclick="zoomFit()">FIT</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast"></div>
    <div id="loading">
        <div class="spinner"></div>
        <div id="loading-msg">LOADING</div>
        <div id="loading-sub"></div>
    </div>

    <input type="file" id="file-input" accept=".txt,.bfx" style="display:none" onchange="loadScriptFile(event)">
    <input type="file" id="media-input" accept="image/*,video/*" style="display:none" onchange="loadMedia(event)">

    <script>
        // ─────────────────────────────────────────────────────────
        // ICARO-QUINE ENGINE
        // The code that makes the image IS the image.
        // ─────────────────────────────────────────────────────────

        const G_COLS = 128, G_ROWS = 96;
        const CELL_W = 7, CELL_H = 9; // px per cell for the quine text
        const CW = G_COLS * CELL_W, CH = G_ROWS * CELL_H; // canvas size
        const DOT_CW = 640, DOT_CH = 480, DOT_BSZ = 5; // dot mode sizes

        let renderMode = 'quine'; // 'quine' or 'dots'
        let fps = 12;
        let playing = false;
        let playRAF = null;
        let lastFrameTime = 0;
        let currentFrame = 0;
        let frames = []; // each frame is a Uint8Array[G_ROWS * G_COLS] of intensity 0-7
        let sourceCode = ''; // the BEFLIX script text (the quine body)
        let zoom = 1;

        const cvs = document.getElementById('quine-canvas');
        const ctx = cvs.getContext('2d');

        // ── QUINE CHARACTER MAP ──
        // Pre-compute which character goes in each grid cell
        function getQuineChar(cellIndex) {
            if (!sourceCode || sourceCode.length === 0) return ' ';
            // Strip newlines for continuous flow, but keep spaces
            return sourceCode[cellIndex % sourceCode.length];
        }

        // ── INTENSITY TO OPACITY ──
        function intensityToOpacity(v) {
            // 0 = invisible, 7 = fully opaque
            const map = [0.0, 0.08, 0.16, 0.28, 0.42, 0.58, 0.78, 1.0];
            return map[Math.max(0, Math.min(7, v))];
        }

        // ── DOT STAMPS (for dot mode) ──
        const DOT_STAMPS = [];
        function buildDotStamps() {
            const maxR = DOT_BSZ * 0.45;
            for (let v = 0; v < 8; v++) {
                const c = document.createElement('canvas');
                c.width = DOT_BSZ; c.height = DOT_BSZ;
                if (v > 0) {
                    const dc = c.getContext('2d');
                    const r = maxR * (v / 7);
                    dc.fillStyle = '#000000';
                    dc.beginPath();
                    dc.arc(DOT_BSZ / 2, DOT_BSZ / 2, Math.max(0.4, r), 0, Math.PI * 2);
                    dc.fill();
                }
                DOT_STAMPS[v] = c;
            }
        }
        buildDotStamps();

        // ── RENDER: QUINE MODE ──
        function renderQuine(frame) {
            cvs.width = CW;
            cvs.height = CH;

            // Black background
            ctx.fillStyle = '#0a0a0c';
            ctx.fillRect(0, 0, CW, CH);

            if (!frame) return;

            // Prepare the source code flow — include newlines as visible chars
            const codeChars = sourceCode || '';
            const codeLen = codeChars.length;
            if (codeLen === 0) return;

            ctx.font = '7px "JetBrains Mono", "Courier New", monospace';
            ctx.textBaseline = 'top';
            ctx.textAlign = 'left';

            let charIdx = 0;
            for (let gy = 0; gy < G_ROWS; gy++) {
                for (let gx = 0; gx < G_COLS; gx++) {
                    const intensity = frame[gy * G_COLS + gx];
                    const opacity = intensityToOpacity(intensity);

                    if (opacity < 0.01) {
                        charIdx++;
                        continue; // invisible — skip
                    }

                    const ch = codeChars[charIdx % codeLen];
                    charIdx++;

                    if (ch === '\n' || ch === '\r') continue; // skip newlines visually

                    const px = gx * CELL_W;
                    const py = gy * CELL_H;

                    ctx.globalAlpha = opacity;
                    // Color tint: high intensity = pure white, low = greenish
                    if (intensity >= 6) {
                        ctx.fillStyle = '#ffffff';
                    } else if (intensity >= 4) {
                        ctx.fillStyle = '#c0ffd0';
                    } else {
                        ctx.fillStyle = '#00ff88';
                    }
                    ctx.fillText(ch, px, py + 1);
                }
            }
            ctx.globalAlpha = 1.0;
        }

        // ── RENDER: DOT MODE (classic) ──
        function renderDots(frame) {
            cvs.width = DOT_CW;
            cvs.height = DOT_CH;

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, DOT_CW, DOT_CH);

            // Fine ruled lines
            ctx.strokeStyle = 'rgba(0,0,0,0.06)';
            ctx.lineWidth = 0.5;
            for (let gy = 0; gy < G_ROWS; gy++) {
                const py = gy * DOT_BSZ + DOT_BSZ * 0.5;
                ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(DOT_CW, py); ctx.stroke();
            }

            if (!frame) return;

            for (let gy = 0; gy < G_ROWS; gy++) {
                for (let gx = 0; gx < G_COLS; gx++) {
                    const val = frame[gy * G_COLS + gx];
                    if (val > 0 && DOT_STAMPS[val]) {
                        ctx.drawImage(DOT_STAMPS[val], gx * DOT_BSZ, gy * DOT_BSZ);
                    }
                }
            }
        }

        // ── RENDER DISPATCH ──
        function render() {
            const frame = frames[currentFrame] || null;
            if (renderMode === 'quine') {
                renderQuine(frame);
            } else {
                renderDots(frame);
            }
            updateScaleCSS();
        }

        // ── CANVAS SCALING ──
        function updateScaleCSS() {
            const vp = document.getElementById('canvas-viewport');
            const w = cvs.width, h = cvs.height;
            const scaleW = (vp.clientWidth - 20) / w;
            const scaleH = (vp.clientHeight - 20) / h;
            const fit = Math.min(scaleW, scaleH, 4);
            const scale = fit * zoom;
            cvs.style.width = (w * scale) + 'px';
            cvs.style.height = (h * scale) + 'px';
            document.getElementById('zoom-display').textContent = Math.round(scale * 100) + '%';
        }

        function zoomCanvas(dir) {
            zoom = Math.max(0.25, Math.min(4, zoom + dir * 0.25));
            updateScaleCSS();
        }

        function zoomFit() {
            zoom = 1;
            updateScaleCSS();
        }

        // ── BEFLIX EXECUTOR ──
        function executeBEFLIX(code) {
            const lines = code.toUpperCase().split('\n');
            const result = [];
            let mat = Array.from({ length: G_ROWS }, () => new Uint8Array(G_COLS));

            for (let li = 0; li < lines.length; li++) {
                const l = lines[li].trim();
                if (!l || l.startsWith('C')) continue;
                const p = l.split(/\s+/);
                const cmd = p[0];
                const a = p.slice(1).map(Number);

                if (cmd === 'CLR') {
                    const v = a[0] || 0;
                    for (let y = 0; y < G_ROWS; y++)
                        for (let x = 0; x < G_COLS; x++)
                            mat[y][x] = v;
                }
                else if (cmd === 'PNT') {
                    const [px, py, pw, ph, pv] = a;
                    for (let y = py; y < py + ph; y++)
                        for (let x = px; x < px + pw; x++)
                            if (y >= 0 && y < G_ROWS && x >= 0 && x < G_COLS)
                                mat[y][x] = pv;
                }
                else if (cmd === 'LIN') {
                    const [x1, y1, x2, y2, lv] = a;
                    let dx = Math.abs(x2 - x1), sx = x1 < x2 ? 1 : -1;
                    let dy = -Math.abs(y2 - y1), sy = y1 < y2 ? 1 : -1;
                    let err = dx + dy, cx = x1, cy = y1, lim = 2000;
                    while (lim-- > 0) {
                        if (cx >= 0 && cx < G_COLS && cy >= 0 && cy < G_ROWS) mat[cy][cx] = lv;
                        if (cx === x2 && cy === y2) break;
                        const e2 = 2 * err;
                        if (e2 >= dy) { err += dy; cx += sx; }
                        if (e2 <= dx) { err += dx; cy += sy; }
                    }
                }
                else if (cmd === 'REC') {
                    const n = Math.min(a[0] || 1, 5000);
                    for (let i = 0; i < n; i++) {
                        const snap = new Uint8Array(G_ROWS * G_COLS);
                        for (let y = 0; y < G_ROWS; y++)
                            for (let x = 0; x < G_COLS; x++)
                                snap[y * G_COLS + x] = mat[y][x];
                        result.push(snap);
                    }
                }
                else if (cmd === 'SHF') {
                    const [sdx, sdy, sn] = a;
                    const count = Math.min(sn || 1, 5000);
                    for (let f = 0; f < count; f++) {
                        const next = Array.from({ length: G_ROWS }, () => new Uint8Array(G_COLS));
                        for (let y = 0; y < G_ROWS; y++)
                            for (let x = 0; x < G_COLS; x++) {
                                const nx = x - sdx, ny = y - sdy;
                                if (nx >= 0 && nx < G_COLS && ny >= 0 && ny < G_ROWS)
                                    next[y][x] = mat[ny][nx];
                            }
                        mat = next;
                        const snap = new Uint8Array(G_ROWS * G_COLS);
                        for (let y = 0; y < G_ROWS; y++)
                            for (let x = 0; x < G_COLS; x++)
                                snap[y * G_COLS + x] = mat[y][x];
                        result.push(snap);
                    }
                }
            }

            // If no REC/SHF, snapshot final state
            if (result.length === 0) {
                const snap = new Uint8Array(G_ROWS * G_COLS);
                for (let y = 0; y < G_ROWS; y++)
                    for (let x = 0; x < G_COLS; x++)
                        snap[y * G_COLS + x] = mat[y][x];
                result.push(snap);
            }

            return result;
        }

        // ── RUN SCRIPT ──
        function runScript() {
            const editor = document.getElementById('script-editor');
            const code = editor.value;
            if (!code.trim()) { toast('NO SCRIPT'); return; }

            showLoading('COMPILING BEFLIX...', '');
            setTimeout(() => {
                try {
                    sourceCode = code; // The quine body
                    frames = executeBEFLIX(code);
                    currentFrame = 0;
                    render();
                    updateFrameDisplay();
                    hideLoading();
                    toast(frames.length + ' FRAMES · QUINE READY');
                } catch (e) {
                    hideLoading();
                    toast('ERROR: ' + e.message);
                    console.error(e);
                }
            }, 50);

        // ── PLAYBACK ──
        function togglePlay() {
            if (frames.length <= 1) return;
            playing = !playing;
            const btn = document.getElementById('play-btn');
            btn.textContent = playing ? '■ STOP' : '▶ PLAY';
            btn.classList.toggle('active', playing);
            if (playing) {
                lastFrameTime = performance.now();
                playRAF = requestAnimationFrame(playLoop);
            } else {
                cancelAnimationFrame(playRAF);
            }
        }

        function playLoop(now) {
            if (!playing) return;
            playRAF = requestAnimationFrame(playLoop);
            const elapsed = now - lastFrameTime;
            if (elapsed >= 1000 / fps) {
                lastFrameTime = now - (elapsed % (1000 / fps));
                currentFrame = (currentFrame + 1) % frames.length;
                render();
                updateFrameDisplay();
            }
        }

        function stepFrame(dir) {
            if (playing) togglePlay();
            if (!frames.length) return;
            currentFrame = (currentFrame + dir + frames.length) % frames.length;
            render();
            updateFrameDisplay();
        }

        function setFPS(val) {
            fps = parseInt(val);
            document.getElementById('fps-val').textContent = fps;
        }

        function updateFrameDisplay() {
            document.getElementById('frame-display').textContent =
                String(currentFrame + 1).padStart(2, '0') + '/' +
                String(frames.length).padStart(2, '0');
        }

        // ── RENDER MODE ──
        function setRenderMode(mode) {
            renderMode = mode;
            document.getElementById('mode-quine').classList.toggle('active', mode === 'quine');
            document.getElementById('mode-dots').classList.toggle('active', mode === 'dots');
            render();
        }

        // ── FILE LOADING ──
        function loadScriptFile(e) {
            const f = e.target.files[0];
            if (!f) return;
            e.target.value = '';
            showLoading('LOADING SCRIPT...', f.name);
            const reader = new FileReader();
            reader.onload = (ev) => {
                const text = ev.target.result;
                document.getElementById('script-editor').value = text;
                updateScriptInfo();
                hideLoading();
                toast(text.split('\n').length + ' LINES LOADED');
                // Auto-run
                sourceCode = text;
                frames = executeBEFLIX(text);
                currentFrame = 0;
                render();
                updateFrameDisplay();
            };
            reader.onerror = () => { hideLoading(); toast('FILE READ FAILED'); };
            reader.readAsText(f);
        }

        // ── IMAGE/VIDEO INGEST ──
        function loadMedia(e) {
            const f = e.target.files[0];
            if (!f) return;
            e.target.value = '';

            if (f.type.startsWith('video/')) {
                ingestVideo(f);
            } else {
                ingestImage(f);
            }
        }

        function ingestImage(file) {
            showLoading('LOADING IMAGE...', file.name);
            const url = URL.createObjectURL(file);
            const img = new Image();
            img.onload = () => {
                // Posterize to 128x96 grid of intensities
                const tmpC = document.createElement('canvas');
                tmpC.width = G_COLS; tmpC.height = G_ROWS;
                const tmpCtx = tmpC.getContext('2d');
                tmpCtx.imageSmoothingEnabled = true;
                tmpCtx.drawImage(img, 0, 0, G_COLS, G_ROWS);
                const px = tmpCtx.getImageData(0, 0, G_COLS, G_ROWS).data;

                const snap = new Uint8Array(G_ROWS * G_COLS);
                for (let i = 0; i < G_ROWS * G_COLS; i++) {
                    const pi = i * 4;
                    const lum = px[pi] * 0.299 + px[pi + 1] * 0.587 + px[pi + 2] * 0.114;
                    snap[i] = Math.round((255 - lum) / 255 * 7);
                }

                // Generate BEFLIX code from the image (decompile)
                const code = decompileFrame(snap);
                document.getElementById('script-editor').value = code;
                updateScriptInfo();
                sourceCode = code;
                frames = [snap];
                currentFrame = 0;
                render();
                updateFrameDisplay();

                URL.revokeObjectURL(url);
                hideLoading();
                toast('IMAGE → QUINE');
            };
            img.onerror = () => { hideLoading(); toast('IMAGE FAILED'); URL.revokeObjectURL(url); };
            img.src = url;
        }

        async function ingestVideo(file) {
            showLoading('RIPPING VIDEO...', file.name);
            const url = URL.createObjectURL(file);
            const vid = document.createElement('video');
            vid.muted = true; vid.playsInline = true; vid.preload = 'auto'; vid.src = url;

            try {
                await new Promise((res, rej) => {
                    vid.onloadedmetadata = res;
                    vid.onerror = () => rej(new Error('unreadable'));
                    setTimeout(() => rej(new Error('timeout')), 8000);
                });
            } catch (e) {
                hideLoading(); toast('VIDEO FAILED'); URL.revokeObjectURL(url); return;
            }

            const dur = vid.duration;
            if (!isFinite(dur) || dur <= 0) { hideLoading(); toast('VIDEO UNREADABLE'); return; }

            const maxF = Math.min(15 * fps, Math.ceil(dur * fps));
            const interval = 1 / fps;
            const capturedFrames = [];
            let lastCap = -Infinity;

            const tmpC = document.createElement('canvas');
            tmpC.width = G_COLS; tmpC.height = G_ROWS;
            const tmpCtx = tmpC.getContext('2d');
            tmpCtx.imageSmoothingEnabled = true;

            await new Promise(resolve => {
                function onRAF() {
                    if (capturedFrames.length >= maxF || vid.ended) { resolve(); return; }
                    if (vid.videoWidth && vid.currentTime - lastCap >= interval - 0.001) {
                        lastCap = vid.currentTime;
                        tmpCtx.drawImage(vid, 0, 0, G_COLS, G_ROWS);
                        const px = tmpCtx.getImageData(0, 0, G_COLS, G_ROWS).data;
                        const snap = new Uint8Array(G_ROWS * G_COLS);
                        for (let i = 0; i < G_ROWS * G_COLS; i++) {
                            const pi = i * 4;
                            const lum = px[pi] * 0.299 + px[pi + 1] * 0.587 + px[pi + 2] * 0.114;
                            snap[i] = Math.round((255 - lum) / 255 * 7);
                        }
                        capturedFrames.push(snap);
                        document.getElementById('loading-sub').textContent =
                            capturedFrames.length + ' frames captured';
                    }
                    requestAnimationFrame(onRAF);
                }
                requestAnimationFrame(onRAF);
                vid.play().catch(() => { });
                setTimeout(resolve, (dur + 3) * 1000);
            });

            vid.pause();
            URL.revokeObjectURL(url);

            if (!capturedFrames.length) { hideLoading(); toast('NO FRAMES CAPTURED'); return; }

            // Generate BEFLIX code for first frame as the quine source
            const code = decompileFrame(capturedFrames[0]);
            document.getElementById('script-editor').value = code;
            updateScriptInfo();

            sourceCode = code;
            frames = capturedFrames;
            currentFrame = 0;
            render();
            updateFrameDisplay();

            hideLoading();
            toast(capturedFrames.length + ' FRAMES → QUINE');
        }

        // ── DECOMPILE: frame → BEFLIX code ──
        function decompileFrame(snap) {
            let code = 'C ICARO-QUINE FRAME\n';

            // Find background ink (most common)
            const counts = new Uint32Array(8);
            for (let i = 0; i < snap.length; i++) counts[snap[i]]++;
            let bgInk = 0, maxCount = 0;
            for (let i = 0; i < 8; i++) {
                if (counts[i] > maxCount) { maxCount = counts[i]; bgInk = i; }
            }

            code += 'CLR ' + bgInk + '\n';

            // RLE encode rows
            for (let gy = 0; gy < G_ROWS; gy++) {
                let gx = 0;
                while (gx < G_COLS) {
                    const ink = snap[gy * G_COLS + gx];
                    if (ink !== bgInk) {
                        const startX = gx;
                        while (gx < G_COLS && snap[gy * G_COLS + gx] === ink) gx++;
                        code += 'PNT ' + startX + ' ' + gy + ' ' + (gx - startX) + ' 1 ' + ink + '\n';
                    } else {
                        gx++;
                    }
                }
            }

            code += 'REC 1\n';
            return code;
        }

        // ── EXPORT ──
        function exportPNG() {
            if (!frames.length) { toast('NO FRAMES'); return; }
            // Render at 2x for quality
            const exportScale = 2;
            const ec = document.createElement('canvas');
            const ew = cvs.width * exportScale;
            const eh = cvs.height * exportScale;
            ec.width = ew; ec.height = eh;
            ec.getContext('2d').drawImage(cvs, 0, 0, ew, eh);
            const link = document.createElement('a');
            link.download = 'ICARO_QUINE_' + Date.now() + '.png';
            link.href = ec.toDataURL('image/png');
            link.click();
            toast('PNG EXPORTED');
        }

        async function exportGIF() {
            if (frames.length < 2) { toast('NEED MULTIPLE FRAMES'); return; }
            showLoading('ENCODING GIF...', '');

            // We'll render each frame to canvas and capture
            const exportScale = 2;
            const ew = cvs.width * exportScale;
            const eh = cvs.height * exportScale;

            // Build frames as data URLs, then assemble
            const frameImages = [];
            const savedMode = renderMode;
            const savedFrame = currentFrame;

            for (let i = 0; i < frames.length; i++) {
                currentFrame = i;
                render();
                const ec = document.createElement('canvas');
                ec.width = ew; ec.height = eh;
                ec.getContext('2d').drawImage(cvs, 0, 0, ew, eh);
                frameImages.push(ec);
                document.getElementById('loading-sub').textContent =
                    'Frame ' + (i + 1) + '/' + frames.length;
                await new Promise(r => setTimeout(r, 0));
            }

            // Restore state
            currentFrame = savedFrame;
            render();

            // Use simple animated GIF encoder (inline minimal encoder)
            // For now, export as individual PNGs or a contact sheet
            const cols = Math.min(5, frameImages.length);
            const rows = Math.ceil(frameImages.length / cols);
            const sheet = document.createElement('canvas');
            sheet.width = cols * ew;
            sheet.height = rows * eh;
            const sctx = sheet.getContext('2d');
            for (let i = 0; i < frameImages.length; i++) {
                sctx.drawImage(frameImages[i], (i % cols) * ew, Math.floor(i / cols) * eh);
            }

            const link = document.createElement('a');
            link.download = 'ICARO_QUINE_SHEET_' + frames.length + 'f.png';
            link.href = sheet.toDataURL('image/png');
            link.click();

            hideLoading();
            toast('CONTACT SHEET EXPORTED · ' + frames.length + ' FRAMES');
        }

        dropTarget.addEventListener('dragover', e => e.preventDefault());
        dropTarget.addEventListener('dragleave', e => {
            document.getElementById('drop-overlay').classList.remove('active');
        });
        dropTarget.addEventListener('drop', e => {
            e.preventDefault();
            document.getElementById('drop-overlay').classList.remove('active');
            const file = e.dataTransfer.files[0];
            if (!file) return;
            if (file.type.startsWith('image/')) {
                ingestImage(file);
            } else if (file.type.startsWith('video/')) {
                ingestVideo(file);
            } else if (file.name.endsWith('.txt') || file.name.endsWith('.bfx')) {
                const reader = new FileReader();
                reader.onload = ev => {
                    const text = ev.target.result;
                    document.getElementById('script-editor').value = text;
                    updateScriptInfo();
                    sourceCode = text;
                    frames = executeBEFLIX(text);
                    currentFrame = 0;
                    render();
                    updateFrameDisplay();
                    toast('SCRIPT DROPPED · ' + frames.length + ' FRAMES');
                };
                reader.readAsText(file);
            }
        });
