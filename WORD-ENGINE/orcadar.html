<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="ORCA LiDAR Engine — Geometric exploration">
    <title>ORCA // LIDAR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            color-scheme: dark;
            --bg: #050403;
            --amber: #ff8c00;
            --cyan: #00ffcc;
            --pink: #e024c3;
            --ui-font: 'Courier New', monospace;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: var(--ui-font);
            color: var(--amber);
            cursor: crosshair;
            touch-action: none;
            overscroll-behavior: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ── Boot Screen ── */
        #boot-screen {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 24px;
            animation: bootFlicker 0.15s infinite alternate;
            padding: 20px;
        }

        @keyframes bootFlicker {
            0% {
                opacity: 0.92;
            }

            100% {
                opacity: 1;
            }
        }

        .boot-title {
            font-size: 28px;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--amber);
            text-shadow: 0 0 20px rgba(255, 140, 0, 0.5);
            text-align: center;
        }

        .boot-sub {
            font-size: 12px;
            color: rgba(255, 140, 0, 0.5);
            letter-spacing: 2px;
            line-height: 1.8;
            text-align: center;
        }

        .boot-btn {
            margin-top: 20px;
            background: transparent;
            border: 1px solid var(--amber);
            color: var(--amber);
            padding: 14px 36px;
            font-family: var(--ui-font);
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .boot-btn:hover {
            background: var(--amber);
            color: #000;
        }

        /* ── Main Canvas ── */
        #game-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ── CRT Overlay ── */
        .crt {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            background:
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.04));
            background-size: 100% 3px, 3px 100%;
            opacity: 0.12;
        }

        /* ── HUD ── */
        .hud {
            position: fixed;
            z-index: 200;
            pointer-events: none;
            font-size: 11px;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px #000;
            transition: opacity 2s ease;
        }

        .hud-tl {
            top: 16px;
            left: 16px;
        }

        .hud-tr {
            top: 16px;
            right: 16px;
            text-align: right;
        }

        .hud-bl {
            bottom: 16px;
            left: 16px;
        }

        .hud-label {
            color: rgba(255, 140, 0, 0.6);
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .hud-value {
            color: var(--amber);
            margin-top: 2px;
        }

        .hud-scan {
            color: var(--cyan);
            margin-top: 6px;
            max-width: 300px;
            font-size: 11px;
            line-height: 1.5;
            white-space: pre-wrap;
            text-shadow: 0 0 5px rgba(0, 255, 204, 0.3);
        }

        /* ── Collected Poem UI ── */
        #collected-poem {
            position: fixed;
            top: 50%;
            right: 40px;
            transform: translateY(-50%);
            z-index: 150;
            pointer-events: none;
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 300;
            font-style: italic;
            color: rgba(224, 36, 195, 0.9);
            text-shadow: 0 0 10px rgba(224, 36, 195, 0.5);
            text-align: right;
            line-height: 1.8;
            max-width: 400px;
            transition: all 4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* The majestic completion state */
        #collected-poem.complete {
            top: 50%;
            right: 50%;
            transform: translate(50%, -50%);
            text-align: center;
            font-size: 26px;
            max-width: 800px;
            line-height: 2.2;
            background: radial-gradient(circle, rgba(5, 4, 3, 0.95) 0%, rgba(5, 4, 3, 0.8) 60%, rgba(5, 4, 3, 0) 100%);
            padding: 60px;
            border-radius: 20px;
        }

        .poem-line {
            opacity: 0;
            animation: fadeInPoem 2s forwards;
            transition: color 4s ease, text-shadow 4s ease;
        }

        #collected-poem.complete .poem-line {
            color: var(--cyan);
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.8);
            animation: algorithmicPulse 6s infinite alternate;
        }

        #collected-poem.complete .poem-line:nth-child(even) {
            animation-delay: 1s;
            color: #88ff00;
            text-shadow: 0 0 15px rgba(136, 255, 0, 0.5);
        }

        @keyframes fadeInPoem {
            to {
                opacity: 1;
            }
        }

        @keyframes algorithmicPulse {
            0% {
                filter: hue-rotate(0deg);
                opacity: 0.8;
            }

            100% {
                filter: hue-rotate(40deg);
                opacity: 1;
            }
        }

        /* ── Controls hint ── */
        .controls-hint {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            pointer-events: none;
            font-size: 10px;
            color: rgba(255, 140, 0, 0.5);
            letter-spacing: 2px;
            text-align: center;
            transition: opacity 2s;
            white-space: nowrap;
            text-shadow: 1px 1px 2px #000;
        }

        /* Mobile overrides */
        @media (max-width: 768px) {
            .boot-title {
                font-size: 20px;
            }

            .hud-bl {
                bottom: 100px;
            }

            .controls-hint {
                bottom: 40px;
                font-size: 8px;
                white-space: normal;
            }

            #collected-poem {
                top: 80px;
                transform: none;
                right: 16px;
                left: 16px;
                text-align: center;
                font-size: 14px;
            }

            #collected-poem.complete {
                top: 50%;
                right: auto;
                left: 50%;
                transform: translate(-50%, -50%);
                font-size: 16px;
                width: 90vw;
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <div id="boot-screen">
        <div class="boot-title">ORCA // GEOMETRY SCANNER</div>
        <div class="boot-sub">
            INITIALIZING LIDAR CORE...<br>
            CALIBRATING SENSORS...<br>
            AWAITING DEPLOYMENT...<br><br>
            <span id="font-loader" style="color: var(--cyan)">AWAITING TYPOGRAPHY ENGINE...</span>
        </div>
        <button class="boot-btn" id="boot-btn" style="display: none;">Deploy</button>
    </div>

    <canvas id="game-canvas"></canvas>
    <div class="crt"></div>

    <div class="hud hud-tl">
        <div class="hud-label">Material</div>
        <div class="hud-value" id="hud-zone">UNKNOWN</div>
    </div>
    <div class="hud hud-tr">
        <div class="hud-label">Position</div>
        <div class="hud-value" id="hud-pos">0, 0</div>
    </div>
    <div class="hud hud-bl">
        <div class="hud-label">LiDAR Scan Data</div>
        <div class="hud-scan" id="hud-scan">AWAITING PHOTONIC RETURN...</div>
    </div>

    <div id="collected-poem"></div>

    <div class="controls-hint" id="controls-hint">
        WASD / LEFT TOUCH: MOVE &nbsp; | &nbsp; MOUSE / RIGHT TOUCH: SCAN
    </div>

    <script>
        // --- Engine Constants & Setup ---
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });

        // Haptics Helper
        const tryVibrate = (ms) => {
            try {
                if (navigator.vibrate) navigator.vibrate(ms);
            } catch (e) { }
        };

        // Web Audio Sonification Engine
        const SoundEngine = {
            ctx: null,
            masterGain: null,
            reverb: null,
            reverbGain: null,
            delayNode: null,
            delayFeedback: null,
            isScanning: false,
            isComplete: false,
            lastPingTime: 0,
            lastBeatTime: 0,
            notes: [880, 987.77, 1108.73, 1318.51, 1479.98, 1760], // E major pentatonic variations

            init() {
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    this.ctx = new AudioContext();

                    this.masterGain = this.ctx.createGain();
                    this.masterGain.gain.value = 0.5;
                    this.masterGain.connect(this.ctx.destination);

                    // Echolocation Return Delay Line (Algorithmically changes based on physical ray hits)
                    this.delayNode = this.ctx.createDelay(2.0); // max 2 sec delay
                    this.delayNode.delayTime.value = 0.2;
                    this.delayFeedback = this.ctx.createGain();
                    this.delayFeedback.gain.value = 0.4;

                    this.delayNode.connect(this.delayFeedback);
                    this.delayFeedback.connect(this.delayNode);
                    this.delayNode.connect(this.masterGain);

                    // Convolution Reverb (The deep cavern)
                    this.reverb = this.ctx.createConvolver();
                    let length = this.ctx.sampleRate * 4.0;
                    let impulse = this.ctx.createBuffer(2, length, this.ctx.sampleRate);
                    let left = impulse.getChannelData(0);
                    let right = impulse.getChannelData(1);

                    for (let i = 0; i < length; i++) {
                        let decay = Math.pow(1 - i / length, 4);
                        left[i] = (Math.random() * 2 - 1) * decay;
                        right[i] = (Math.random() * 2 - 1) * decay;
                    }
                    this.reverb.buffer = impulse;

                    this.reverbGain = this.ctx.createGain();
                    this.reverbGain.gain.value = 1.2;

                    this.reverb.connect(this.reverbGain);
                    this.reverbGain.connect(this.masterGain);

                    // Connect delay returns to reverb for maximum space
                    this.delayFeedback.connect(this.reverb);

                } catch (e) { console.warn("Web Audio API not supported", e); }
            },

            // The outgoing LiDAR pulse
            ping(panValue = 0) {
                if (!this.ctx || this.isComplete) return;
                const now = this.ctx.currentTime;

                if (now - this.lastPingTime < 0.08) return;
                this.lastPingTime = now;

                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();

                const panner = this.ctx.createStereoPanner ? this.ctx.createStereoPanner() : this.ctx.createGain();
                if (panner.pan) {
                    panner.pan.value = panValue;
                }

                osc.type = 'sine';
                const baseFreq = this.notes[Math.floor(Math.random() * this.notes.length)];
                const freq = baseFreq * (Math.random() > 0.8 ? 2 : 1);

                osc.frequency.setValueAtTime(freq, now);
                osc.frequency.exponentialRampToValueAtTime(freq * 0.95, now + 0.05);

                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.15, now + 0.005);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);

                osc.connect(gain);
                gain.connect(panner);

                // Signal split: direct out, into the cavern reverb, and into the algorithmic delay return
                panner.connect(this.masterGain);
                panner.connect(this.reverb);
                panner.connect(this.delayNode);

                osc.start(now);
                osc.stop(now + 0.15);
            },

            // Rhythmic Algorithmic Pulse (Speeds up as you get closer to the objective)
            algorithmicBeat(distRatio) {
                if (!this.ctx || this.isComplete) return;
                const now = this.ctx.currentTime;

                // Dynamic tick rate based on distance
                const beatInterval = Math.max(0.08, 0.5 * distRatio);
                if (now - this.lastBeatTime < beatInterval) return;
                this.lastBeatTime = now;

                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();

                // Very short, glitchy square wave tick
                osc.type = 'square';
                osc.frequency.setValueAtTime(1200 - (distRatio * 800), now);

                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.05, now + 0.001);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.03);

                osc.connect(gain);
                gain.connect(this.masterGain);

                osc.start(now);
                osc.stop(now + 0.05);
            },

            beaconPing(panValue = 0, distRatio = 1, lineIndex = 0) {
                if (!this.ctx || this.isComplete) return;
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                const panner = this.ctx.createStereoPanner ? this.ctx.createStereoPanner() : this.ctx.createGain();

                if (panner.pan) panner.pan.value = panValue;

                const baseNotes = [329.63, 369.99, 440.00, 493.88, 554.37];
                let note = baseNotes[lineIndex % baseNotes.length];
                if (lineIndex > 4) note *= 1.5;
                if (lineIndex > 8) note *= 1.25;

                osc.type = 'sine';
                osc.frequency.setValueAtTime(note, now);
                osc.frequency.linearRampToValueAtTime(note + (Math.sin(now) * 2), now + 1);

                const maxVol = 0.35;
                const vol = maxVol * (1 - distRatio * 0.7);

                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(vol, now + 0.8);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 2.5);

                osc.connect(gain);
                gain.connect(panner);
                panner.connect(this.masterGain);
                panner.connect(this.reverb);

                osc.start(now);
                osc.stop(now + 3.0);
            },

            bump() {
                if (!this.ctx) return;
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(30, now + 0.25);

                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.4, now + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);

                osc.connect(gain);
                gain.connect(this.masterGain);
                gain.connect(this.reverb);

                osc.start(now);
                osc.stop(now + 0.35);
            },

            collect() {
                if (!this.ctx) return;
                const now = this.ctx.currentTime;
                const chord = [440, 554.37, 659.25, 830.61];

                chord.forEach((freq, index) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();

                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now);

                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.2 / chord.length, now + 0.1 + (index * 0.05));
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 2.0);

                    osc.connect(gain);
                    gain.connect(this.masterGain);
                    gain.connect(this.reverb);

                    osc.start(now);
                    osc.stop(now + 2.1);
                });
            },

            // The Grand Finale Tone Shift
            finale() {
                if (!this.ctx) return;
                this.isComplete = true;
                const now = this.ctx.currentTime;

                // Lush resolving major chord progression fading in over time
                const root = 220; // A3
                const majorNine = [root, root * 1.25, root * 1.5, root * 1.875, root * 2, root * 2.25];

                majorNine.forEach((freq, index) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    const panner = this.ctx.createStereoPanner ? this.ctx.createStereoPanner() : this.ctx.createGain();

                    if (panner.pan) panner.pan.value = (Math.random() - 0.5) * 0.8;

                    osc.type = 'sine';
                    // Subtle phasing detune
                    osc.frequency.setValueAtTime(freq + (Math.random() * 2), now);

                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.15 / majorNine.length, now + 2.0 + (index * 0.8)); // Swell in
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 15.0); // Very long decay

                    osc.connect(gain);
                    gain.connect(panner);
                    panner.connect(this.masterGain);
                    panner.connect(this.reverb);

                    osc.start(now);
                    osc.stop(now + 16.0);
                });

                // Slow down the echo delay to create a vast sense of space opening up
                this.delayNode.delayTime.linearRampToValueAtTime(1.5, now + 4);
                this.delayFeedback.gain.linearRampToValueAtTime(0.7, now + 4);
            },

            update(targetPan = 0, closestObstacleDist = 0, objDistRatio = 1, targetIlluminated = false) {
                if (this.isScanning && !this.isComplete) {

                    // Modulate echolocation physical return delay time based on the closest wall hit
                    if (this.ctx && this.delayNode) {
                        const now = this.ctx.currentTime;
                        // Map distance (0 to 1200) to delay time (0.05s to 0.6s)
                        const dynamicDelay = 0.05 + Math.min(1.0, closestObstacleDist / 1200) * 0.55;
                        this.delayNode.delayTime.setTargetAtTime(dynamicDelay, now, 0.1);
                    }

                    // Trigger algorithmic pulses ONLY if the beam is actively hitting the target
                    if (targetIlluminated) {
                        this.algorithmicBeat(objDistRatio);
                    }

                    // Random ambient Pings
                    if (Math.random() < 0.12) {
                        this.ping(targetPan);
                    }
                }
            },

            setScanning(isScanning) {
                this.isScanning = isScanning;
            }
        };

        // World Grid
        const GRID_W = 400;
        const GRID_H = 400;
        const CELL_SIZE = 12;
        const WORLD_W = GRID_W * CELL_SIZE;
        const WORLD_H = GRID_H * CELL_SIZE;

        let grid = new Array(GRID_W).fill(0).map(() => new Array(GRID_H).fill(null));

        // Persistent World Accumulator (The "LiDAR Map")
        const mapCanvas = document.createElement('canvas');
        mapCanvas.width = WORLD_W;
        mapCanvas.height = WORLD_H;
        const mapCtx = mapCanvas.getContext('2d', { alpha: false });
        mapCtx.fillStyle = '#050403';
        mapCtx.fillRect(0, 0, WORLD_W, WORLD_H);

        // High-Resolution Floor Text Canvas (Revealed by LiDAR)
        const floorCanvas = document.createElement('canvas');
        floorCanvas.width = WORLD_W;
        floorCanvas.height = WORLD_H;
        const floorCtx = floorCanvas.getContext('2d');

        // State Variables
        let isRunning = false;
        let frameCount = 0;
        let currentZone = '';
        let lastBumpTime = 0;
        let lastBeaconFrame = 0;
        let sequenceComplete = false;

        const player = {
            x: WORLD_W / 2,
            y: WORLD_H / 2,
            vx: 0, vy: 0,
            speed: 4.5,
            radius: 4
        };

        const keys = { w: false, a: false, s: false, d: false };
        const mouse = { x: 0, y: 0, isDown: false };

        // Touch controls
        let moveTouchId = null;
        let aimTouchId = null;
        const joystickOrigin = { x: 0, y: 0 };
        const joystickCurrent = { x: 0, y: 0 };
        let joystickActive = false;

        let activeRays = [];
        const sparks = [];
        let radarAngle = 0;

        // Poem State
        let poemNodes = [];
        let currentLineIndex = 0;
        const poemUI = document.getElementById('collected-poem');

        // --- Floor Rendering ---
        function updateFloorCanvas() {
            floorCtx.clearRect(0, 0, WORLD_W, WORLD_H);
            floorCtx.font = 'italic 300 24px "Cormorant Garamond", serif';
            floorCtx.fillStyle = 'rgba(224, 36, 195, 0.9)';
            floorCtx.shadowColor = 'rgba(224, 36, 195, 0.6)';
            floorCtx.shadowBlur = 12;
            floorCtx.textAlign = 'center';
            floorCtx.textBaseline = 'middle';

            // Only draw lines that haven't been collected yet
            for (let i = currentLineIndex; i < poemNodes.length; i++) {
                floorCtx.fillText(poemNodes[i].text, poemNodes[i].x, poemNodes[i].y);
            }
        }

        // --- World Generation (Geometry & Path) ---
        function initWorld() {
            const mindPoem = [
                "Mind in its purest play is like some bat",
                "That beats about in caverns all alone.",
                "Contriving by a kind of senseless wit",
                "Not to conclude against a wall of stone.",
                "It has no need to falter or explore;",
                "Darkly it knows what obstacles are there,",
                "And so may weave and flitter, dip and soar",
                "In perfect courses through the blackest air.",
                "And has this simile a like perfection?",
                "The mind is like a bat.",
                "Precisely. Save That in the very happiest intellection",
                "A graceful error may correct the cave."
            ];

            let currentX = player.x + 200;
            let currentY = player.y - 200;
            poemNodes.push({ x: currentX, y: currentY, text: mindPoem[0] });

            for (let i = 1; i < mindPoem.length; i++) {
                let placed = false;
                let attempts = 0;
                while (!placed && attempts < 1000) {
                    attempts++;
                    let angle = Math.random() * Math.PI * 2;
                    let dist = 400 + Math.random() * 250;
                    let nx = currentX + Math.cos(angle) * dist;
                    let ny = currentY + Math.sin(angle) * dist;

                    if (nx > 400 && nx < WORLD_W - 400 && ny > 400 && ny < WORLD_H - 400) {
                        let tooClose = false;
                        for (let node of poemNodes) {
                            if (Math.hypot(nx - node.x, ny - node.y) < 400) {
                                tooClose = true;
                                break;
                            }
                        }

                        if (!tooClose) {
                            currentX = nx;
                            currentY = ny;
                            poemNodes.push({ x: currentX, y: currentY, text: mindPoem[i] });
                            placed = true;
                        }
                    }
                }
            }

            updateFloorCanvas();

            for (let i = 0; i < GRID_W; i++) {
                for (let j = 0; j < GRID_H; j++) {
                    grid[i][j] = null;
                }
            }

            for (let i = 0; i < GRID_W; i++) {
                grid[i][0] = grid[i][GRID_H - 1] = { zone: 'BOUNDARY', color: '#ff0000', text: 'Perimeter.' };
                grid[0][i] = grid[GRID_W - 1][i] = { zone: 'BOUNDARY', color: '#ff0000', text: 'Perimeter.' };
            }

            const isNearNode = (gx, gy) => {
                let px = gx * CELL_SIZE;
                let py = gy * CELL_SIZE;
                for (let node of poemNodes) {
                    if (Math.sqrt((px - node.x) ** 2 + (py - node.y) ** 2) < 180) {
                        return true;
                    }
                }
                return false;
            };

            for (let k = 0; k < 600; k++) {
                let x = Math.floor(Math.random() * (GRID_W - 20)) + 10;
                let y = Math.floor(Math.random() * (GRID_H - 20)) + 10;
                let isHoriz = Math.random() > 0.5;
                let wallLength = Math.floor(Math.random() * 30) + 10;
                let thickness = Math.floor(Math.random() * 3) + 1;

                for (let l = 0; l < wallLength; l++) {
                    for (let t = 0; t < thickness; t++) {
                        let wx = isHoriz ? x + l : x + t;
                        let wy = isHoriz ? y + t : y + l;

                        if (wx >= 0 && wx < GRID_W && wy >= 0 && wy < GRID_H) {
                            if (!isNearNode(wx, wy)) {
                                let spawnDist = Math.sqrt((wx * CELL_SIZE - player.x) ** 2 + (wy * CELL_SIZE - player.y) ** 2);
                                if (spawnDist > 100) {
                                    grid[wx][wy] = { zone: 'MAZE_WALL', color: '#ff0055', text: '"Not to conclude against a wall of stone."' };
                                }
                            }
                        }
                    }
                }
            }
        }

        // --- Input Handling ---
        window.addEventListener('resize', resizeCanvas);
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (keys.hasOwnProperty(k)) keys[k] = true;
        });
        window.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase();
            if (keys.hasOwnProperty(k)) keys[k] = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (aimTouchId !== null) return;
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        canvas.addEventListener('mousedown', (e) => {
            if (aimTouchId !== null) return;
            mouse.isDown = true;
            if (!sequenceComplete) tryVibrate(15);
        });
        canvas.addEventListener('mouseup', () => mouse.isDown = false);

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if (t.clientX < window.innerWidth / 2 && moveTouchId === null) {
                    moveTouchId = t.identifier;
                    joystickOrigin.x = t.clientX;
                    joystickOrigin.y = t.clientY;
                    joystickCurrent.x = t.clientX;
                    joystickCurrent.y = t.clientY;
                    joystickActive = true;
                } else if (t.clientX >= window.innerWidth / 2 && aimTouchId === null) {
                    aimTouchId = t.identifier;
                    mouse.x = t.clientX;
                    mouse.y = t.clientY;
                    mouse.isDown = true;
                    if (!sequenceComplete) tryVibrate(15);
                }
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if (t.identifier === moveTouchId) {
                    joystickCurrent.x = t.clientX;
                    joystickCurrent.y = t.clientY;
                } else if (t.identifier === aimTouchId) {
                    mouse.x = t.clientX;
                    mouse.y = t.clientY;
                }
            }
        }, { passive: false });

        const handleTouchEnd = (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if (t.identifier === moveTouchId) {
                    moveTouchId = null;
                    joystickActive = false;
                } else if (t.identifier === aimTouchId) {
                    aimTouchId = null;
                    mouse.isDown = false;
                }
            }
        };
        canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
        canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });

        // --- Raycasting (DDA Algorithm) ---
        function castRay(ox, oy, angle, maxDist) {
            let dirX = Math.cos(angle);
            let dirY = Math.sin(angle);
            let rayX = ox / CELL_SIZE;
            let rayY = oy / CELL_SIZE;
            let mapX = Math.floor(rayX);
            let mapY = Math.floor(rayY);
            let deltaDistX = Math.abs(1 / dirX);
            let deltaDistY = Math.abs(1 / dirY);
            let stepX, stepY;
            let sideDistX, sideDistY;

            if (dirX < 0) {
                stepX = -1;
                sideDistX = (rayX - mapX) * deltaDistX;
            } else {
                stepX = 1;
                sideDistX = (mapX + 1.0 - rayX) * deltaDistX;
            }
            if (dirY < 0) {
                stepY = -1;
                sideDistY = (rayY - mapY) * deltaDistY;
            } else {
                stepY = 1;
                sideDistY = (mapY + 1.0 - rayY) * deltaDistY;
            }

            let hit = false;
            let distance = 0;
            let hitData = null;

            while (!hit && distance < maxDist / CELL_SIZE) {
                if (sideDistX < sideDistY) {
                    sideDistX += deltaDistX;
                    mapX += stepX;
                    distance = sideDistX - deltaDistX;
                } else {
                    sideDistY += deltaDistY;
                    mapY += stepY;
                    distance = sideDistY - deltaDistY;
                }

                if (mapX < 0 || mapX >= GRID_W || mapY < 0 || mapY >= GRID_H) break;

                if (grid[mapX][mapY]) {
                    hit = true;
                    hitData = grid[mapX][mapY];
                }
            }

            if (hit) {
                let exactX = rayX + dirX * distance;
                let exactY = rayY + dirY * distance;
                return {
                    x: exactX * CELL_SIZE,
                    y: exactY * CELL_SIZE,
                    dist: distance * CELL_SIZE,
                    data: hitData
                };
            }
            return null;
        }

        // --- Core Logic Update ---
        function update() {
            let vx = 0, vy = 0;

            if (keys.w) vy -= player.speed;
            if (keys.s) vy += player.speed;
            if (keys.a) vx -= player.speed;
            if (keys.d) vx += player.speed;

            if (joystickActive) {
                let dx = joystickCurrent.x - joystickOrigin.x;
                let dy = joystickCurrent.y - joystickOrigin.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 0) {
                    let maxDist = 40;
                    let strength = Math.min(dist, maxDist) / maxDist;
                    vx += (dx / dist) * (player.speed * strength);
                    vy += (dy / dist) * (player.speed * strength);
                }
            }

            if (vx !== 0 && vy !== 0 && !joystickActive) {
                const len = Math.sqrt(vx * vx + vy * vy);
                vx = (vx / len) * player.speed;
                vy = (vy / len) * player.speed;
            }

            const nextX = player.x + vx;
            const nextY = player.y + vy;
            let collided = false;

            const gridX = Math.floor(nextX / CELL_SIZE);
            const gridY = Math.floor(player.y / CELL_SIZE);
            if (gridX >= 0 && gridX < GRID_W && !grid[gridX][gridY]) {
                player.x = nextX;
            } else if (vx !== 0) { collided = true; }

            const gridX2 = Math.floor(player.x / CELL_SIZE);
            const gridY2 = Math.floor(nextY / CELL_SIZE);
            if (gridY2 >= 0 && gridY2 < GRID_H && !grid[gridX2][gridY2]) {
                player.y = nextY;
            } else if (vy !== 0) { collided = true; }

            if (collided && !sequenceComplete) {
                let now = performance.now();
                if (now - lastBumpTime > 200) {
                    tryVibrate(8);
                    SoundEngine.bump();
                    lastBumpTime = now;
                }
            }

            if (frameCount % 10 === 0 && !sequenceComplete) {
                document.getElementById('hud-pos').textContent = `${Math.floor(player.x)}, ${Math.floor(player.y)}`;
            }

            // Scanner & Guidance Logic
            activeRays = [];
            const camX = player.x - canvas.width / 2;
            const camY = player.y - canvas.height / 2;
            const mouseAngle = Math.atan2(mouse.y - (player.y - camY), mouse.x - (player.x - camX));

            let closestHitDist = 1200; // Track shortest physical ray collision
            let distToTarget = 1200;
            let panValue = 0;
            let target = null;

            // Check Collection & Progression State
            if (!sequenceComplete && currentLineIndex < poemNodes.length) {
                target = poemNodes[currentLineIndex];
                distToTarget = Math.sqrt((player.x - target.x) ** 2 + (player.y - target.y) ** 2);

                if (distToTarget < 120 && mouse.isDown) {
                    SoundEngine.collect();
                    tryVibrate([30, 50, 30]);

                    const newLine = document.createElement('div');
                    newLine.className = 'poem-line';
                    newLine.textContent = target.text;
                    poemUI.appendChild(newLine);

                    currentLineIndex++;
                    updateFloorCanvas();

                    if (currentLineIndex >= poemNodes.length) {
                        sequenceComplete = true;
                        document.getElementById('hud-scan').textContent = "SEQUENCE COMPLETE.";
                        document.getElementById('hud-zone').textContent = "TRANSCENDENCE";

                        // Fade out HUD slightly
                        document.querySelectorAll('.hud').forEach(el => el.style.opacity = '0.3');

                        // Trigger Finale Sequence
                        poemUI.classList.add('complete');
                        SoundEngine.finale();
                    }
                }

                if (!sequenceComplete) {
                    let dx = target.x - player.x;
                    panValue = Math.max(-1, Math.min(1, dx / 300));
                }
            }

            radarAngle += 0.05;
            if (!sequenceComplete) {
                for (let i = 0; i < 4; i++) {
                    const rAngle = radarAngle + (i * (Math.PI / 2));
                    const hit = castRay(player.x, player.y, rAngle, 800);
                    if (hit) {
                        mapCtx.fillStyle = hit.data.color;
                        mapCtx.globalAlpha = 0.2;
                        mapCtx.fillRect(hit.x, hit.y, 2, 2);
                        mapCtx.globalAlpha = 1.0;
                    }
                }
            }

            if (mouse.isDown && !sequenceComplete) {
                if (frameCount % 30 === 0) tryVibrate(5);

                const numRays = 60;
                const coneSpread = Math.PI / 3.5;

                for (let i = 0; i < numRays; i++) {
                    const angle = mouseAngle + (Math.random() - 0.5) * coneSpread;
                    const hit = castRay(player.x, player.y, angle, 1200);

                    if (hit) {
                        activeRays.push({ endX: hit.x, endY: hit.y });
                        closestHitDist = Math.min(closestHitDist, hit.dist);

                        if (Math.random() < 0.6) {
                            mapCtx.fillStyle = hit.data.color;
                            mapCtx.globalAlpha = 0.5;
                            mapCtx.fillRect(hit.x + (Math.random() - 0.5) * 3, hit.y + (Math.random() - 0.5) * 3, 2.5, 2.5);
                            mapCtx.globalAlpha = 1.0;
                        }

                        if (Math.random() < 0.3) {
                            sparks.push({
                                x: hit.x,
                                y: hit.y,
                                vx: (Math.random() - 0.5) * 1.5,
                                vy: (Math.random() - 0.5) * 1.5,
                                life: 1.0,
                                color: hit.data.color
                            });
                        }

                        if (hit.data.zone !== currentZone && frameCount % 5 === 0) {
                            currentZone = hit.data.zone;
                            document.getElementById('hud-zone').textContent = currentZone;
                            if (currentLineIndex < poemNodes.length) {
                                document.getElementById('hud-scan').textContent = "SEEKING SIGNAL...";
                            }
                        }
                    } else {
                        activeRays.push({
                            endX: player.x + Math.cos(angle) * 1200,
                            endY: player.y + Math.sin(angle) * 1200
                        });
                    }
                }

                // Determine if target is currently illuminated by the scanner beam
                let targetIlluminated = false;
                if (target) {
                    let targetAngle = Math.atan2(target.y - player.y, target.x - player.x);
                    let angleDiff = Math.atan2(Math.sin(targetAngle - mouseAngle), Math.cos(targetAngle - mouseAngle));

                    // Is target within the scanning cone angle?
                    if (Math.abs(angleDiff) < coneSpread / 2) {
                        // Cast a direct ray to see if it's occluded by a wall
                        let directHit = castRay(player.x, player.y, targetAngle, distToTarget);
                        // If it hits nothing, or the hit is behind the text, it's illuminated
                        if (!directHit || directHit.dist >= distToTarget - CELL_SIZE) {
                            targetIlluminated = true;
                        }
                    }
                }

                // Trigger the gentle guide beacon chime only when illuminated
                if (targetIlluminated) {
                    if (frameCount - lastBeaconFrame > 45) { // 0.75s debounce
                        let distRatio = Math.min(1, distToTarget / 1500);
                        SoundEngine.beaconPing(panValue, distRatio, currentLineIndex);
                        lastBeaconFrame = frameCount;
                    }
                }

                SoundEngine.setScanning(true);
                let objDistRatio = Math.min(1, distToTarget / 1000);
                SoundEngine.update(panValue, closestHitDist, objDistRatio, targetIlluminated);

            } else {
                SoundEngine.setScanning(false);
            }
        }

        // --- Render Loop ---
        function render() {
            // If sequence is complete, clear canvas slightly to fade out the maze
            if (sequenceComplete) {
                ctx.fillStyle = 'rgba(5, 4, 3, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = '#050403';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            const camX = player.x - canvas.width / 2;
            const camY = player.y - canvas.height / 2;

            if (!sequenceComplete) {
                ctx.drawImage(mapCanvas, -camX, -camY);
            }

            // Draw Sonar Pulse for the target objective & Edge Compass
            if (!sequenceComplete && currentLineIndex < poemNodes.length) {
                let target = poemNodes[currentLineIndex];
                let hue = 30 + (currentLineIndex * 15);

                ctx.save();
                let pulseTime = frameCount % 150;
                let radius = pulseTime * 6;
                let alpha = Math.max(0, 1 - (pulseTime / 150));

                ctx.beginPath();
                ctx.arc(target.x - camX, target.y - camY, radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${hue}, 100%, 60%, ${alpha * 0.6})`;
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(target.x - camX, target.y - camY, 3 + Math.sin(frameCount * 0.1) * 2, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue}, 100%, 60%, ${alpha})`;
                ctx.fill();
                ctx.restore();

                let dx = target.x - player.x;
                let dy = target.y - player.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                let angle = Math.atan2(dy, dx);
                let screenRadius = Math.min(canvas.width, canvas.height) / 2;

                if (dist > screenRadius) {
                    let indX = canvas.width / 2 + Math.cos(angle) * (screenRadius - 40);
                    let indY = canvas.height / 2 + Math.sin(angle) * (screenRadius - 40);

                    ctx.save();
                    ctx.translate(indX, indY);
                    ctx.rotate(angle);
                    ctx.beginPath();
                    ctx.moveTo(12, 0);
                    ctx.lineTo(-6, 8);
                    ctx.lineTo(-2, 0);
                    ctx.lineTo(-6, -8);
                    ctx.closePath();
                    ctx.fillStyle = `hsla(${hue}, 100%, 60%, ${0.4 + Math.sin(frameCount * 0.1) * 0.4})`;
                    ctx.fill();
                    ctx.restore();
                }
            }

            ctx.globalCompositeOperation = 'screen';
            for (let i = sparks.length - 1; i >= 0; i--) {
                let s = sparks[i];
                s.x += s.vx;
                s.y += s.vy;
                s.life -= 0.02;
                if (s.life <= 0) {
                    sparks.splice(i, 1);
                    continue;
                }
                ctx.fillStyle = s.color;
                ctx.globalAlpha = s.life;
                ctx.fillRect(s.x - camX, s.y - camY, 2.5, 2.5);
            }
            ctx.globalAlpha = 1.0;

            if (activeRays.length > 0 && !sequenceComplete) {
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(player.x - camX, player.y - camY);
                let sortedRays = [...activeRays].sort((a, b) => {
                    return Math.atan2(a.endY - player.y, a.endX - player.x) - Math.atan2(b.endY - player.y, b.endX - player.x);
                });
                for (let ray of sortedRays) {
                    ctx.lineTo(ray.endX - camX, ray.endY - camY);
                }
                ctx.closePath();

                ctx.clip();
                ctx.globalAlpha = 0.8;
                ctx.drawImage(floorCanvas, -camX, -camY);

                ctx.fillStyle = 'rgba(0, 255, 204, 0.02)';
                ctx.fill();
                ctx.restore();

                ctx.strokeStyle = 'rgba(0, 255, 204, 0.06)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                for (let ray of activeRays) {
                    ctx.moveTo(player.x - camX, player.y - camY);
                    ctx.lineTo(ray.endX - camX, ray.endY - camY);
                }
                ctx.stroke();
            }
            ctx.globalCompositeOperation = 'source-over';

            if (!sequenceComplete) {
                ctx.fillStyle = 'rgba(0, 255, 204, 0.9)';
                ctx.beginPath();
                ctx.arc(player.x - camX, player.y - camY, player.radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = 'rgba(0, 255, 204, 0.3)';
                ctx.beginPath();
                ctx.arc(player.x - camX, player.y - camY, player.radius + 4 + Math.sin(frameCount * 0.1) * 2, 0, Math.PI * 2);
                ctx.stroke();

                if (joystickActive) {
                    ctx.strokeStyle = 'rgba(255, 140, 0, 0.3)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(joystickOrigin.x, joystickOrigin.y, 40, 0, Math.PI * 2);
                    ctx.stroke();

                    ctx.fillStyle = 'rgba(255, 140, 0, 0.6)';
                    ctx.beginPath();
                    ctx.arc(joystickCurrent.x, joystickCurrent.y, 15, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function gameLoop() {
            if (!isRunning) return;
            frameCount++;
            update();
            render();
            requestAnimationFrame(gameLoop);
        }

        // --- Boot Sequence ---
        document.fonts.ready.then(() => {
            const loader = document.getElementById('font-loader');
            if (loader) loader.style.display = 'none';
            const btn = document.getElementById('boot-btn');
            if (btn) btn.style.display = 'inline-block';
        });

        document.getElementById('boot-btn').addEventListener('click', () => {
            SoundEngine.init();
            document.getElementById('boot-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('boot-screen').style.display = 'none';
            }, 300);

            resizeCanvas();
            initWorld();
            isRunning = true;
            requestAnimationFrame(gameLoop);

            setTimeout(() => {
                document.getElementById('controls-hint').style.opacity = '0';
            }, 8000);
        });

    </script>
</body>
