<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="ORCA LiDAR Engine — Geometric exploration">
    <title>ORCA // BAT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            color-scheme: dark;
            --bg: #050403;
            --amber: #ff8c00;
            --cyan: #00ffcc;
            --pink: #e024c3;
            --ui-font: 'Courier New', monospace;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: var(--ui-font);
            color: var(--amber);
            cursor: crosshair;
            touch-action: none;
            overscroll-behavior: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ── Boot Screen ── */
        #boot-screen {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 24px;
            animation: bootFlicker 0.15s infinite alternate;
            padding: 20px;
        }

        @keyframes bootFlicker {
            0% { opacity: 0.92; }
            100% { opacity: 1; }
        }

        .boot-title {
            font-size: 28px;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--amber);
            text-shadow: 0 0 20px rgba(255, 140, 0, 0.5);
            text-align: center;
        }

        .boot-sub {
            font-size: 12px;
            color: rgba(255, 140, 0, 0.5);
            letter-spacing: 2px;
            line-height: 1.8;
            text-align: center;
        }

        .boot-btn {
            margin-top: 20px;
            background: transparent;
            border: 1px solid var(--amber);
            color: var(--amber);
            padding: 14px 36px;
            font-family: var(--ui-font);
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .boot-btn:hover {
            background: var(--amber);
            color: #000;
        }

        /* ── Main Canvas ── */
        #game-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ── CRT Overlay ── */
        .crt {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            background:
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.04));
            background-size: 100% 3px, 3px 100%;
            opacity: 0.12;
        }

        /* ── HUD ── */
        .hud {
            position: fixed;
            z-index: 200;
            pointer-events: none;
            font-size: 11px;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px #000;
        }

        .hud-tl { top: 16px; left: 16px; }
        .hud-tr { top: 16px; right: 16px; text-align: right; }
        .hud-bl { bottom: 16px; left: 16px; }

        .hud-label {
            color: rgba(255, 140, 0, 0.6);
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .hud-value {
            color: var(--amber);
            margin-top: 2px;
        }

        .hud-scan {
            color: var(--cyan);
            margin-top: 6px;
            max-width: 300px;
            font-size: 11px;
            line-height: 1.5;
            white-space: pre-wrap;
            text-shadow: 0 0 5px rgba(0, 255, 204, 0.3);
        }

        /* ── Collected Poem UI ── */
        #collected-poem {
            position: fixed;
            top: 50%;
            right: 40px;
            transform: translateY(-50%);
            z-index: 150;
            pointer-events: none;
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 300;
            font-style: italic;
            color: rgba(224, 36, 195, 0.9);
            text-shadow: 0 0 10px rgba(224, 36, 195, 0.5);
            text-align: right;
            line-height: 1.8;
            max-width: 400px;
        }

        .poem-line {
            opacity: 0;
            animation: fadeInPoem 2s forwards;
            margin-bottom: 6px;
        }

        @keyframes fadeInPoem {
            to { opacity: 1; }
        }

        /* ── Controls hint ── */
        .controls-hint {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            pointer-events: none;
            font-size: 10px;
            color: rgba(255, 140, 0, 0.5);
            letter-spacing: 2px;
            text-align: center;
            transition: opacity 2s;
            white-space: nowrap;
            text-shadow: 1px 1px 2px #000;
        }

        /* Mobile overrides */
        @media (max-width: 768px) {
            .boot-title { font-size: 20px; }
            .hud-bl { bottom: 100px; }
            .controls-hint {
                bottom: 40px;
                font-size: 8px;
                white-space: normal;
            }
            #collected-poem {
                top: 80px;
                transform: none;
                right: 16px;
                left: 16px;
                text-align: center;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <div id="boot-screen">
        <div class="boot-title">ECHO // BAT</div>
        <div class="boot-sub">
            INITIALIZING CORE...<br>
            AWAITING DEPLOYMENT...<br><br>
            <span id="font-loader" style="color: var(--cyan)">AWAITING TYPOGRAPHY ENGINE...</span>
        </div>
        <button class="boot-btn" id="boot-btn" style="display: none;">Deploy</button>
    </div>

    <canvas id="game-canvas"></canvas>
    <div class="crt"></div>

    <div class="hud hud-tl">
        <div class="hud-label">Material</div>
        <div class="hud-value" id="hud-zone">UNKNOWN</div>
    </div>
    <div class="hud hud-tr">
        <div class="hud-label">Position</div>
        <div class="hud-value" id="hud-pos">0, 0</div>
    </div>
    <div class="hud hud-bl">
        <div class="hud-label">Echolocation Data</div>
        <div class="hud-scan" id="hud-scan">AWAITING PHOTONIC RETURN...</div>
    </div>

    <div id="collected-poem"></div>

    <div class="controls-hint" id="controls-hint">
        WASD / LEFT TOUCH: MOVE &nbsp; | &nbsp; MOUSE / RIGHT TOUCH: SCAN
    </div>

    <script type="module" src="./bat.ts"></script>
</body>

</html>
