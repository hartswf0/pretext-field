<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Lantern Consciousness: an open, associational reading interface inspired by Gopnik's wide-attention theory, using Pretext for JS-driven text layout.">
  <title>Lantern Consciousness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; }

    :root {
      color-scheme: light;
      --bg: #faf6ef;
      --warm-bg: #f5ede0;
      --ink: #2a241e;
      --muted: #8a7e6f;
      --soft: #c4b8a6;
      --accent: #7b6b4e;
      --lantern: rgba(255,220,150,0.08);
      --lantern-glow: rgba(255,200,100,0.06);
      --thought-bg: rgba(123,107,78,0.06);
      --thought-border: rgba(123,107,78,0.12);
      --column-width: 620px;
      --margin-width: 220px;
      --line-height: 32px;
      --font-size: 19px;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
    }

    body {
      font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
      overflow-x: hidden;
      cursor: default;
    }

    /* Ambient atmospheric glow — lantern light */
    .atmosphere {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .atmosphere::before {
      content: '';
      position: absolute;
      top: -20%;
      left: 10%;
      width: 80%;
      height: 60%;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(255,215,140,0.09) 0%, transparent 70%);
      animation: lantern-drift-1 18s ease-in-out infinite alternate;
    }

    .atmosphere::after {
      content: '';
      position: absolute;
      bottom: -10%;
      right: 5%;
      width: 60%;
      height: 50%;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(200,180,140,0.07) 0%, transparent 65%);
      animation: lantern-drift-2 22s ease-in-out infinite alternate;
    }

    @keyframes lantern-drift-1 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(5%, 8%) scale(1.1); }
    }

    @keyframes lantern-drift-2 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-4%, -6%) scale(1.05); }
    }

    /* Top bar */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      background: linear-gradient(180deg, rgba(250,246,239,0.95) 0%, rgba(250,246,239,0) 100%);
      pointer-events: none;
    }

    .topbar > * { pointer-events: auto; }

    .mode-label {
      font: 500 11px/1 'Inter', sans-serif;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mode-orb {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,200,100,0.9) 0%, rgba(200,160,80,0.4) 70%, transparent 100%);
      box-shadow: 0 0 14px rgba(255,200,100,0.3);
      animation: orb-breathe 4s ease-in-out infinite;
    }

    @keyframes orb-breathe {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.4); opacity: 1; }
    }

    .awareness-label {
      font: 400 11px/1 'Inter', sans-serif;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Main layout — two-zone: reading + marginalia */
    .page {
      position: relative;
      z-index: 5;
      display: flex;
      justify-content: center;
      gap: 48px;
      max-width: 1080px;
      margin: 0 auto;
      padding: 100px 28px 120px;
    }

    /* Reading column */
    .reading-column {
      width: var(--column-width);
      max-width: 100%;
      flex-shrink: 0;
    }

    /* Title block */
    .title-block {
      margin-bottom: 48px;
      opacity: 0;
      animation: emerge 1.6s ease 0.3s forwards;
    }

    @keyframes emerge {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .title-eyebrow {
      font: 500 11px/1 'Inter', sans-serif;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 18px;
    }

    .title-main {
      font: 300 44px/1.12 'Cormorant Garamond', serif;
      color: var(--ink);
      margin-bottom: 10px;
    }

    .title-author {
      font: italic 300 22px/1.4 'Cormorant Garamond', serif;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .title-source {
      font: 400 12px/1.5 'Inter', sans-serif;
      color: var(--soft);
    }

    .title-divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, var(--accent), transparent);
      margin: 28px 0;
    }

    .reading-intro {
      font: italic 300 16px/1.65 'Cormorant Garamond', serif;
      color: var(--muted);
      max-width: 50ch;
      margin-bottom: 36px;
      opacity: 0;
      animation: emerge 1.6s ease 0.6s forwards;
    }

    /* Reading body */
    .reading-body {
      position: relative;
      width: 100%;
      opacity: 0;
      animation: emerge 1.6s ease 0.9s forwards;
    }

    .reading-line {
      position: absolute;
      left: 0;
      white-space: pre;
      font: 400 var(--font-size)/1 'Cormorant Garamond', Georgia, serif;
      color: var(--ink);
      letter-spacing: 0.003em;
      cursor: text;
      user-select: text;
      transition: color 600ms ease, opacity 600ms ease;
    }

    .reading-line:hover {
      color: var(--accent);
    }

    /* Paragraph gaps */
    .para-gap {
      position: absolute;
      left: 0;
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, var(--soft), transparent);
    }

    /* Marginalia — floating thoughts */
    .margins {
      width: var(--margin-width);
      flex-shrink: 1;
      position: relative;
    }

    .thought {
      position: absolute;
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--thought-bg);
      border: 1px solid var(--thought-border);
      font: 300 13px/1.55 'Inter', sans-serif;
      color: var(--muted);
      opacity: 0;
      transform: translateX(12px);
      transition: opacity 800ms ease, transform 800ms ease;
    }

    .thought--visible {
      opacity: 1;
      transform: translateX(0);
    }

    .thought-label {
      display: block;
      font: 600 9px/1 'Inter', sans-serif;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .thought em {
      font-style: italic;
      color: var(--accent);
    }

    /* Epiphany flash */
    .epiphany-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 15;
      background: radial-gradient(circle at var(--flash-x, 50%) var(--flash-y, 50%), rgba(255,220,140,0.15) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 400ms ease;
    }

    .epiphany-flash--active {
      opacity: 1;
    }

    /* Controls */
    .controls {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 20px;
      border-radius: 999px;
      background: rgba(250,246,239,0.92);
      border: 1px solid rgba(196,184,166,0.3);
      backdrop-filter: blur(16px);
      box-shadow: 0 12px 40px rgba(42,36,30,0.08);
    }

    .controls label {
      font: 500 10px/1 'Inter', sans-serif;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .controls input[type="range"] {
      width: 120px;
      accent-color: var(--accent);
    }

    .controls .val {
      font: 600 11px/1 'Inter', sans-serif;
      color: var(--accent);
      min-width: 42px;
      text-align: right;
    }

    .wander-btn {
      padding: 6px 14px;
      border: 1px solid rgba(123,107,78,0.25);
      border-radius: 999px;
      background: transparent;
      color: var(--accent);
      font: 600 10px/1 'Inter', sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 200ms ease, border-color 200ms ease;
      white-space: nowrap;
    }

    .wander-btn:hover {
      background: rgba(123,107,78,0.08);
      border-color: var(--accent);
    }

    .wander-btn--active {
      background: rgba(123,107,78,0.12);
      border-color: var(--accent);
    }

    /* Wander particles */
    .wander-particle {
      position: fixed;
      pointer-events: none;
      z-index: 12;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,200,100,0.25) 0%, rgba(200,160,80,0.08) 60%, transparent 100%);
      animation: particle-float 12s ease-in-out infinite;
    }

    @keyframes particle-float {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
      25% { transform: translate(20px, -30px) scale(1.3); opacity: 0.6; }
      50% { transform: translate(-15px, -15px) scale(0.9); opacity: 0.4; }
      75% { transform: translate(10px, 20px) scale(1.15); opacity: 0.5; }
    }

    @media (max-width: 900px) {
      .margins { display: none; }
      .page { padding: 80px 18px 100px; }
    }

    @media (max-width: 680px) {
      :root {
        --column-width: 100%;
        --font-size: 18px;
        --line-height: 30px;
      }
      .title-main { font-size: 34px; }
      .controls { gap: 10px; padding: 8px 14px; }
    }
  </style>
</head>
<body>
  <div class="atmosphere"></div>
  <div class="epiphany-flash" id="epiphany-flash"></div>

  <!-- Wander particles — injected by JS -->
  <div id="particles-container"></div>

  <div class="topbar">
    <div class="mode-label">
      <span class="mode-orb"></span>
      Lantern Consciousness
    </div>
    <div class="awareness-label">360° Awareness</div>
  </div>

  <main class="page" id="page">
    <div class="reading-column">
      <header class="title-block">
        <p class="title-eyebrow">Reading Mode · Lantern</p>
        <h1 class="title-main">Preface</h1>
        <p class="title-author">Clifford Geertz</p>
        <p class="title-source">Available Light: Anthropological Reflections on Philosophical Topics</p>
        <div class="title-divider"></div>
      </header>

      <p class="reading-intro">
        Let your mind wander. The text is a scaffold—an anchor for your attention,
        not a cage. Look up from the page. See what comes to you.
      </p>

      <div class="reading-body" id="reading-body"></div>
    </div>

    <aside class="margins" id="margins">
      <!-- Marginalia injected by JS -->
    </aside>
  </main>

  <div class="controls" id="controls">
    <label>Column</label>
    <input id="width-slider" type="range" min="360" max="680" value="560">
    <span class="val" id="width-value">560px</span>
    <button class="wander-btn" id="wander-btn">Let Mind Wander</button>
  </div>

  <script type="module" src="./lantern.ts"></script>
</body>
</html>
